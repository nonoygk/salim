<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-title" content="サリムとおでかけ">
<link rel="apple-touch-icon" href="https://raw.githubusercontent.com/nonoygk/salim/main/ui/icon.jpg">
<link rel="icon" type="image/jpeg" href="https://raw.githubusercontent.com/nonoygk/salim/main/ui/icon.jpg">
<title>サリムとおでかけ 〜ラズレム散策〜</title>
<style>
  :root {
    --navy: #17366f;
    --navy-light: #345c9d;
    --gold: #d6b15d;
    --text: #2d3d62;
    --muted: #8c8068;
    --paper: rgba(255,255,255,0.9);
  }

  * { box-sizing: border-box; }

  html, body {
    margin: 0;
    min-height: 100%;
    touch-action: manipulation;
    -webkit-text-size-adjust: 100%;
  }

  body {
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    background: #F0F8FF;
    color: var(--text);
    text-align: center;
  }

  button, a, .place-card, .souvenir-card, .outing-stage, .modal-overlay {
    touch-action: manipulation;
    -webkit-tap-highlight-color: transparent;
  }

  button {
    border: 1px solid rgba(214,177,93,0.88);
    border-radius: 999px;
    margin: 3px;
    padding: 10px 18px;
    background: var(--navy);
    color: white;
    font-size: 15px;
    font-weight: bold;
    box-shadow: 0 3px 7px rgba(23,54,111,0.15);
  }

  button:active { transform: translateY(1px); }
  button.secondary { background: rgba(255,255,255,0.96); color: var(--navy); border: 2px solid var(--gold); }
  button.soft { background: #958b79; border-color: #958b79; }

  .game {
    width: min(100%, 960px);
    margin: 0 auto;
    padding: 14px;
  }

  .title-card {
    margin: 0 auto 10px;
    padding: 2px 8px 9px;
    width: min(100%, 760px);
    background: rgba(255,255,255,0.92);
    border: 2px solid var(--gold);
    border-radius: 22px;
    box-shadow: 0 7px 18px rgba(45,61,98,0.12);
  }

  .title-logo {
    width: min(100%, 620px);
    display: block;
    margin: -8px auto -6px;
  }

  h1 {
    margin: 0;
    color: var(--navy);
    font-size: 25px;
    line-height: 1.35;
  }

  .subtitle {
    margin: 0;
    color: var(--muted);
    font-size: 13px;
    line-height: 1.55;
  }

  .status-strip {
    width: min(100%, 760px);
    margin: 8px auto;
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 7px;
  }

  .status-pill {
    padding: 7px 8px;
    background: rgba(255,255,255,0.86);
    border: 1px solid rgba(214,177,93,0.78);
    border-radius: 999px;
    color: var(--navy);
    font-size: 12px;
    font-weight: bold;
    line-height: 1.35;
    box-shadow: 0 3px 8px rgba(45,61,98,0.05);
  }

  .outing-stage {
    position: relative;
    width: 100%;
    aspect-ratio: 4 / 3;
    max-height: 680px;
    margin: 10px auto;
    overflow: hidden;
    background: #ead8bf center / cover no-repeat;
    border: 3px solid var(--gold);
    border-radius: 24px;
    box-shadow: 0 7px 18px rgba(45,61,98,0.16);
  }

  .place-view {
    display: none;
  }

  .place-view.active {
    display: block;
  }

  .outing-stage::after {
    content: "";
    position: absolute;
    inset: 0;
    background: linear-gradient(to bottom, rgba(255,255,255,0.02), rgba(23,54,111,0.16));
    pointer-events: none;
  }

  .place-label {
    position: absolute;
    left: 12px;
    top: 12px;
    z-index: 3;
    max-width: 72%;
    padding: 7px 12px;
    background: rgba(255,255,255,0.92);
    border: 2px solid var(--gold);
    border-radius: 999px;
    color: var(--navy);
    font-size: 13px;
    font-weight: bold;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
  }

  .outing-note {
    position: absolute;
    right: 12px;
    top: 12px;
    z-index: 3;
    width: min(44%, 330px);
    padding: 9px 12px;
    background: rgba(255,255,255,0.88);
    border: 2px solid rgba(214,177,93,0.82);
    border-radius: 16px;
    color: var(--text);
    font-size: 11px;
    line-height: 1.55;
    text-align: left;
    box-shadow: 0 4px 10px rgba(0,0,0,0.08);
  }

  .outing-note-title {
    color: var(--navy);
    font-size: 12px;
    font-weight: bold;
    margin-bottom: 3px;
  }

  .character-area {
    position: absolute;
    inset: 0;
    z-index: 2;
    pointer-events: none;
  }

  .outing-salim,
  .event-character {
    position: absolute;
    bottom: 2%;
    width: clamp(120px, 24%, 190px);
    max-width: none;
    filter: drop-shadow(0 8px 10px rgba(0,0,0,0.2));
  }

  .outing-salim {
    left: 50%;
    transform: translateX(-50%);
  }

  .event-character {
    display: none;
    left: calc(50% + clamp(55px, 8vw, 72px));
    filter: drop-shadow(0 8px 10px rgba(0,0,0,0.18));
  }

  .event-character.visible { display: block; }

  .message-box {
    width: min(100%, 760px);
    min-height: 112px;
    margin: 10px auto;
    padding: 14px 18px;
    display: flex;
    flex-direction: column;
    justify-content: center;
    gap: 6px;
    background: var(--paper);
    border: 2px solid var(--gold);
    border-radius: 18px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    line-height: 1.65;
    white-space: pre-line;
  }

  .message-title {
    color: var(--navy);
    font-size: 13px;
    font-weight: bold;
  }

  .message-main {
    color: var(--text);
    font-size: 15px;
  }

  .message-reward {
    color: var(--muted);
    font-size: 12px;
    font-weight: bold;
  }

  .place-grid {
    width: min(100%, 820px);
    margin: 10px auto 0;
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
  }

  .place-card {
    min-height: 72px;
    padding: 11px 10px;
    background: rgba(255,255,255,0.9);
    border: 2px solid rgba(214,177,93,0.82);
    border-radius: 17px;
    box-shadow: 0 4px 10px rgba(45,61,98,0.06);
    text-align: left;
  }

  .place-card button {
    width: 100%;
    margin: 0;
    padding: 8px 10px;
    white-space: normal;
    line-height: 1.35;
  }

  .place-card-desc {
    margin-top: 6px;
    color: var(--muted);
    font-size: 11px;
    line-height: 1.45;
    text-align: center;
  }

  .utility-buttons {
    width: min(100%, 760px);
    margin: 12px auto 0;
    display: flex;
    justify-content: center;
    flex-wrap: wrap;
    gap: 7px;
  }

  .souvenir-grid {
    width: min(100%, 820px);
    margin: 10px auto 0;
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
  }

  .souvenir-card {
    display: grid;
    grid-template-columns: 64px minmax(0, 1fr);
    gap: 9px;
    padding: 10px 11px;
    background: rgba(255,255,255,0.86);
    border: 1px solid rgba(214,177,93,0.8);
    border-radius: 15px;
    box-shadow: 0 4px 10px rgba(45,61,98,0.06);
    text-align: left;
  }

  .souvenir-card.locked { opacity: 0.6; }

  .souvenir-icon {
    width: 62px;
    height: 62px;
    display: flex;
    align-items: center;
    justify-content: center;
    background: rgba(240,248,255,0.92);
    border: 1px solid rgba(214,177,93,0.72);
    border-radius: 14px;
    font-size: 28px;
    overflow: hidden;
  }

  .souvenir-icon img {
    width: 100%;
    height: 100%;
    object-fit: contain;
    display: block;
  }

  .souvenir-name {
    color: var(--navy);
    font-size: 13px;
    font-weight: bold;
    line-height: 1.35;
  }

  .souvenir-meta,
  .souvenir-desc,
  .souvenir-comment {
    margin-top: 3px;
    color: var(--muted);
    font-size: 11px;
    line-height: 1.45;
  }

  .souvenir-comment { color: var(--text); }

  .souvenir-card button {
    grid-column: 1 / 3;
    width: 100%;
    margin: 7px 0 0;
    padding: 8px 10px;
    font-size: 12px;
  }

  .modal-overlay {
    position: fixed;
    inset: 0;
    z-index: 80;
    display: none;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    background: rgba(240,248,255,0.985);
    text-align: center;
  }

  .modal-overlay.open { display: flex; }

  .modal-window {
    width: min(100%, 960px);
    height: 100dvh;
    max-height: 100%;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: #F0F8FF;
  }

  .modal-header {
    flex: 0 0 auto;
    display: grid;
    grid-template-columns: 86px minmax(0, 1fr) 86px;
    align-items: center;
    gap: 4px;
    padding: 10px 12px;
    background: rgba(255,255,255,0.96);
    border-bottom: 2px solid var(--gold);
    box-shadow: 0 4px 12px rgba(45,61,98,0.1);
  }

  .modal-header h2 {
    margin: 0;
    color: var(--navy);
    font-size: 19px;
    line-height: 1.35;
  }

  .modal-back {
    min-width: 0;
    margin: 0;
    padding: 8px 9px;
    font-size: 13px;
    white-space: nowrap;
  }

  .modal-scroll {
    flex: 1 1 auto;
    min-height: 0;
    overflow-y: auto;
    overscroll-behavior: contain;
    -webkit-overflow-scrolling: touch;
    padding: 12px 12px calc(18px + env(safe-area-inset-bottom));
  }

  .viewer-window {
    width: min(96vw, 620px);
    height: 100dvh;
    margin: 0 auto;
    padding: calc(10px + env(safe-area-inset-top)) 10px calc(14px + env(safe-area-inset-bottom));
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 8px;
  }

  .viewer-image-wrap {
    width: min(92vw, 520px);
    max-height: 76dvh;
    padding: 8px;
    background: rgba(255,255,255,0.94);
    border: 2px solid var(--gold);
    border-radius: 18px;
    box-shadow: 0 10px 28px rgba(45,61,98,0.22);
  }

  .viewer-image-wrap img {
    width: 100%;
    max-height: calc(76dvh - 20px);
    display: block;
    object-fit: contain;
    border-radius: 12px;
  }

  .viewer-title {
    max-width: min(92vw, 520px);
    padding: 7px 12px;
    background: rgba(255,255,255,0.9);
    border: 1px solid rgba(214,177,93,0.8);
    border-radius: 999px;
    color: var(--navy);
    font-size: 13px;
    font-weight: bold;
  }


  .mini-game-button {
    width: 100%;
    margin: 7px 0 0;
    padding: 8px 12px;
    background: #345c9d;
    border-color: rgba(214,177,93,0.88);
    font-size: 12px;
  }

  .mini-game-panel {
    width: min(100%, 760px);
    margin: 8px auto;
    padding: 12px;
    background: rgba(255,255,255,0.9);
    border: 2px solid var(--gold);
    border-radius: 18px;
    color: var(--text);
    line-height: 1.65;
  }

  .mini-game-status {
    margin: 0 0 8px;
    color: var(--navy);
    font-size: 13px;
    font-weight: bold;
    white-space: pre-line;
  }

  .mini-game-question {
    margin: 8px 0 10px;
    padding: 12px;
    background: rgba(240,248,255,0.85);
    border: 1px solid rgba(214,177,93,0.72);
    border-radius: 14px;
    font-size: 14px;
    white-space: pre-line;
  }

  .mini-game-choices {
    display: grid;
    gap: 8px;
  }

  .mini-game-choices button {
    width: 100%;
    margin: 0;
    white-space: normal;
    line-height: 1.45;
  }

  .memory-game-board {
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 8px;
    margin-top: 8px;
  }

  .memory-card {
    width: 100%;
    aspect-ratio: 1 / 1;
    margin: 0;
    padding: 0;
    border-radius: 16px;
    border: 2px solid rgba(214,177,93,0.92);
    background:
      radial-gradient(circle at top left, rgba(255,255,255,0.35), transparent 40%),
      linear-gradient(135deg, #17366f, #345c9d);
    color: #fff7d8;
    font-size: 25px;
    box-shadow: 0 4px 10px rgba(45,61,98,0.16);
    overflow: hidden;
  }

  .memory-card.flipped,
  .memory-card.matched {
    background: rgba(255,255,255,0.96);
  }

  .memory-card.matched {
    opacity: 0.82;
  }

  .memory-card img {
    width: 100%;
    height: 100%;
    display: block;
    object-fit: contain;
    padding: 5px;
  }

  .memory-result-note {
    margin-top: 10px;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.55;
  }

  /* water mirror gem match */
  .gem-match-game { display: grid; gap: 10px; }

  .gem-match-score {
    display: flex;
    justify-content: center;
    gap: 12px;
    padding: 9px 10px;
    border: 1px solid rgba(214,177,93,0.78);
    border-radius: 14px;
    background: linear-gradient(135deg, #0d3c5e, #236d91 52%, #1d497b);
    color: #f3fbff;
    font-size: 13px;
    font-weight: bold;
  }

  .gem-match-score strong { color: #ffe49a; font-size: 16px; }

  .gem-match-board {
    display: grid;
    grid-template-columns: repeat(6, minmax(0, 1fr));
    gap: 5px;
    padding: 7px;
    border: 2px solid rgba(214,177,93,0.82);
    border-radius: 16px;
    background: linear-gradient(135deg, rgba(255,255,255,0.14), transparent 35%), radial-gradient(circle at 50% 20%, rgba(117,226,255,0.22), transparent 45%), #123d68;
    box-shadow: inset 0 0 18px rgba(122,233,255,0.24);
  }

  .gem-tile {
    position: relative;
    aspect-ratio: 1 / 1;
    margin: 0;
    padding: 4px;
    overflow: hidden;
    border: 1px solid rgba(255,255,255,0.34);
    border-radius: 9px;
    background: rgba(7,35,69,0.66);
    box-shadow: inset 0 0 5px rgba(255,255,255,0.16);
    transition: transform 0.14s ease, box-shadow 0.14s ease;
  }

  .gem-tile.selected { transform: scale(0.91); outline: 3px solid #ffe08b; outline-offset: -2px; box-shadow: 0 0 13px rgba(255,226,136,0.9), inset 0 0 5px rgba(255,255,255,0.24); }
  .gem-tile:disabled { opacity: 0.82; }

  .gem-piece {
    position: relative;
    display: block;
    width: 100%;
    height: 100%;
    clip-path: polygon(50% 1%, 89% 23%, 100% 61%, 70% 96%, 30% 96%, 0 61%, 11% 23%);
    filter: drop-shadow(0 2px 2px rgba(0,0,0,0.34));
  }

  .gem-piece::before { content: ''; position: absolute; inset: 8% 14% 42% 20%; background: rgba(255,255,255,0.7); clip-path: polygon(50% 0, 100% 100%, 0 82%); }
  .gem-piece::after { content: ''; position: absolute; inset: 35% 14% 8% 14%; background: rgba(10,16,65,0.22); clip-path: polygon(50% 100%, 0 0, 100% 0); }
  .gem-ruby { background: radial-gradient(circle at 28% 20%, #ffd1e0, #ee3977 38%, #891d55 100%); }
  .gem-sapphire { background: radial-gradient(circle at 28% 20%, #d2f4ff, #3d9ff2 38%, #173b9d 100%); }
  .gem-emerald { background: radial-gradient(circle at 28% 20%, #d7ffe3, #3dcc83 38%, #08705d 100%); }
  .gem-amethyst { background: radial-gradient(circle at 28% 20%, #f1d8ff, #a767df 38%, #54258d 100%); }
  .gem-citrine { background: radial-gradient(circle at 28% 20%, #fff8cf, #f4ba3d 38%, #b96019 100%); }
  .gem-aquamarine { background: radial-gradient(circle at 28% 20%, #d7ffff, #43cbd0 38%, #12769e 100%); }
  .gem-match-note { color: var(--muted); font-size: 12px; line-height: 1.55; text-align: center; }

  .star-card-game {
    display: grid;
    gap: 12px;
  }

  .star-card-score {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 10px;
    padding: 9px 10px;
    border: 1px solid rgba(214,177,93,0.78);
    border-radius: 14px;
    background: linear-gradient(135deg, #102b5c, #214b8d);
    color: #fff7d8;
    font-size: 13px;
    font-weight: bold;
  }

  .star-card-score strong {
    color: #f4cf72;
    font-size: 17px;
  }

  .star-card-hint,
  .star-card-result {
    padding: 10px 12px;
    border-radius: 14px;
    background: rgba(240,248,255,0.86);
    border: 1px solid rgba(214,177,93,0.62);
    color: var(--text);
    font-size: 13px;
    line-height: 1.6;
    white-space: pre-line;
  }

  .star-card-hand,
  .star-card-reveal {
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 9px;
  }

  .star-card-reveal {
    grid-template-columns: repeat(2, minmax(0, 1fr));
    width: min(100%, 300px);
    margin: 0 auto;
  }

  .star-card {
    position: relative;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    min-height: 142px;
    margin: 0;
    padding: 8px 5px 10px;
    overflow: hidden;
    border: 2px solid #e1bd65;
    border-radius: 15px;
    background:
      radial-gradient(circle at 22% 18%, rgba(255,255,255,0.18) 0 1px, transparent 2px),
      radial-gradient(circle at 77% 25%, rgba(255,255,255,0.2) 0 1px, transparent 2px),
      radial-gradient(circle at 64% 71%, rgba(255,255,255,0.14) 0 1px, transparent 2px),
      linear-gradient(145deg, #10275a, #275494 55%, #15366f);
    color: #fff8dd;
    box-shadow: inset 0 0 0 3px rgba(255,248,220,0.1), 0 5px 11px rgba(22,48,95,0.2);
    transition: transform 0.16s ease, box-shadow 0.16s ease, filter 0.16s ease;
  }

  button.star-card:hover,
  button.star-card:focus-visible {
    transform: translateY(-4px);
    box-shadow: inset 0 0 0 3px rgba(255,248,220,0.18), 0 9px 16px rgba(22,48,95,0.28), 0 0 12px rgba(231,193,96,0.68);
    filter: brightness(1.08);
  }

  .star-card-label {
    position: relative;
    z-index: 1;
    margin-top: 8px;
    color: #fff4ca;
    font-family: 'Hiragino Mincho ProN', 'Yu Mincho', serif;
    font-size: 13px;
    font-weight: bold;
    letter-spacing: 0.08em;
  }

  .star-card-owner {
    position: relative;
    z-index: 1;
    margin-bottom: 4px;
    color: rgba(255,244,202,0.82);
    font-size: 10px;
  }

  .celestial-symbol {
    position: relative;
    z-index: 1;
    width: 58px;
    height: 58px;
    flex: 0 0 auto;
  }

  .celestial-symbol.sun {
    border-radius: 50%;
    background: repeating-conic-gradient(from 0deg, #efc45e 0deg 10deg, transparent 10deg 22deg);
  }

  .celestial-symbol.sun::after {
    content: '';
    position: absolute;
    inset: 12px;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #fff3bb, #e8ae37 70%);
    box-shadow: 0 0 12px rgba(249,206,90,0.85);
  }

  .celestial-symbol.moon {
    overflow: hidden;
    border-radius: 50%;
    background: radial-gradient(circle at 35% 30%, #fff9d3, #e6c16d 72%);
    box-shadow: 0 0 12px rgba(255,240,174,0.58);
  }

  .celestial-symbol.moon::after {
    content: '';
    position: absolute;
    width: 54px;
    height: 54px;
    top: -5px;
    left: 18px;
    border-radius: 50%;
    background: #1d4786;
  }

  .celestial-symbol.star {
    background: linear-gradient(135deg, #fff7c5, #e5b749 65%);
    clip-path: polygon(50% 0%, 61% 34%, 98% 35%, 68% 56%, 79% 94%, 50% 72%, 21% 94%, 32% 56%, 2% 35%, 39% 34%);
    filter: drop-shadow(0 0 7px rgba(251,213,105,0.8));
  }

  .star-card-back {
    justify-content: center;
    background:
      radial-gradient(circle at 22% 18%, #f8dc83 0 1px, transparent 2px),
      radial-gradient(circle at 77% 25%, #f8dc83 0 1px, transparent 2px),
      radial-gradient(circle at 64% 71%, #f8dc83 0 1px, transparent 2px),
      linear-gradient(145deg, #0d2451, #1c437f 55%, #102d61);
  }

  .star-card-back-mark {
    position: relative;
    width: 60px;
    height: 60px;
    border: 2px solid rgba(246,211,116,0.9);
    border-radius: 50%;
    box-shadow: inset 0 0 0 5px rgba(246,211,116,0.14);
  }

  .star-card-back-mark::before,
  .star-card-back-mark::after {
    content: '';
    position: absolute;
    left: 50%;
    top: 50%;
    width: 28px;
    height: 2px;
    background: #f6d374;
    transform: translate(-50%, -50%);
  }

  .star-card-back-mark::after {
    transform: translate(-50%, -50%) rotate(90deg);
  }




  /* garden growing mini game */
  .garden-panel {
    width: min(100%, 760px);
    margin: 8px auto;
    padding: 12px;

  function storageKey(name) { return STORAGE_PREFIX + name; }

  function loadNumber(name, fallback) {
    const saved = localStorage.getItem(storageKey(name));
    if (saved === null) return fallback;
    const value = Number(saved);
    return Number.isFinite(value) ? value : fallback;
  }

  function loadText(name, fallback) {
    const saved = localStorage.getItem(storageKey(name));
    return saved === null ? fallback : saved;
  }

  function loadJSON(name, fallback) {
    const saved = localStorage.getItem(storageKey(name));
    if (saved === null) return fallback;
    try {
      const value = JSON.parse(saved);
      return value && typeof value === "object" ? value : fallback;
    } catch (error) {
      return fallback;
    }
  }

  function getLevel() {
    return Math.floor(Math.sqrt(totalAffinityEarned / LEVEL_GROWTH_BASE)) + 1;
  }

    if (level >= 1000) return "唯一無二の伴侶";
    if (level >= 500) return "最愛の人";
    if (level >= 250) return "恋人";
    if (level >= 100) return "大切な存在";
    if (level >= 50) return "心惹かれる相手";

    if (level >= 10) return "顔なじみ";
    return "王宮を訪れた客人";
  }

  function isLoverLevel() {

  function pickRandom(list) {
    return list[Math.floor(Math.random() * list.length)];

  function getLocalDateString(date) {
    const year = date.getFullYear();
    const month = String(date.getMonth() + 1).padStart(2, "0");
    const day = String(date.getDate()).padStart(2, "0");
    return year + "-" + month + "-" + day;
  }

  function formatNumber(value) {
    value = Math.floor(Number(value) || 0);
    if (value < 10000000) return String(value);
    if (value >= 100000000) return Math.floor(value / 100000000) + "億";
    return Math.floor(value / 10000) + "万";
  }

  function visitPlace(placeId) {
    const place = getPlaceById(placeId);
    if (!place) return;

    outingCount += 1;
    visitedPlaces[placeId] = (visitedPlaces[placeId] || 0) + 1;
    lastPlace = placeId;
    addAffinity(50);

    outingStage.style.backgroundImage = 'url("' + place.image + '")';
    placeLabel.textContent = place.name;
    eventCharacter.classList.remove("visible");
    eventCharacter.src = "";
    eventCharacter.alt = "";

    const unownedHere = getSouvenirsByPlace(placeId).filter(function(item) {
      return isSouvenirImplemented(item.id) && !ownedSouvenirs[item.id];
    });
    const roll = Math.random();
    let title = place.shortName;
    let mainText = "";
    let rewardText = "💖 +50";
    let historyType = "talk";

    if (false && unownedHere.length > 0 && roll < 0.22) {
      const souvenir = pickRandom(unownedHere);
      grantSouvenir(souvenir);
      addAffinity(120);
      title = "新しいお土産を入手しました";
      mainText = "「" + souvenir.comment + "」\n\n" + souvenir.name + " を手に入れた。";
      rewardText = "🎁 " + souvenir.name + "｜💖 +170";
      historyType = "souvenir";
    } else if (roll < 0.58) {
      showCharacterForPlace(place);
      const character = CHARACTER_EVENTS[place.character];
      const pool = isLoverLevel() ? character.loverLines.concat(character.lines) : character.lines;
      title = character.eventTitle || (character.name + "と出会いました");
      mainText = pickRandom(pool);
      rewardText = "💖 +50";
      historyType = place.character;
    } else if (roll < 0.78) {
      title = place.shortName + "の小さな出来事";
      mainText = pickRandom(place.eventLines);
      rewardText = "💖 +50";
      historyType = "event";
    } else {
      const linePool = isLoverLevel() ? place.loverLines : place.normalLines;
      title = "サリムとの散策";
      mainText = "「" + pickRandom(linePool) + "」";
      rewardText = "💖 +50";
      historyType = "salim";
    }

    messageTitle.textContent = title;
    messageMain.textContent = mainText;
    messageReward.textContent = rewardText;

    eventHistory.push({
      date: getLocalDateString(new Date()),
      placeId: placeId,
      type: historyType,
      title: title
    });

    saveOutingData();
    updateStatus();
    renderSouvenirs();
  }

  function getGardenStageFromCareDays() {
    if (gardenStage <= 0) return 0;
    if (gardenCareDays >= 7) return 5;
    if (gardenCareDays >= 6) return 4;
    if (gardenCareDays >= 4) return 3;
    if (gardenCareDays >= 2) return 2;
    return 1;
  }

  function clampGardenStage() {
    gardenStage = Math.max(0, Math.min(GARDEN_STAGES.length - 1, Number(gardenStage) || 0));
    gardenCareDays = Math.max(0, Number(gardenCareDays) || 0);
    if (gardenStage > 0) {
      gardenStage = getGardenStageFromCareDays();
    }
  }

  function getGardenStageInfo() {
    clampGardenStage();
    return GARDEN_STAGES[gardenStage] || GARDEN_STAGES[0];
  }


  function openGardenGame() {
    selectedPlaceId = "palaceGarden";
    lastPlace = "palaceGarden";
    renderGardenGame();
    openModal("gardenGameMenu");
    saveOutingData();
  }

  function renderGardenGame() {
    const info = getGardenStageInfo();
    if (gardenScene) gardenScene.style.backgroundImage = "linear-gradient(rgba(255,250,240,0.08), rgba(255,250,240,0.08)), url('" + GARDEN_IMAGES.background + "')";
    if (gardenPlotImage) gardenPlotImage.src = GARDEN_IMAGES[info.key] || GARDEN_IMAGES.dry;
    if (gardenStatus) {
      const dayText = gardenStage <= 0 ? "未開始" : gardenCareDays + "日目";
      gardenStatus.textContent = "月白花｜成長：" + dayText + "｜段階：" + info.label + "｜収穫：" + gardenHarvestCount + "回";
    }
    if (gardenCaption) gardenCaption.textContent = info.caption;
    if (!gardenActions) return;

    gardenActions.innerHTML = "";
    const mainButton = document.createElement("button");
    mainButton.type = "button";
    mainButton.textContent = info.action;
    mainButton.onclick = advanceGarden;
    gardenActions.appendChild(mainButton);

    const resetButton = document.createElement("button");
    resetButton.type = "button";
    resetButton.className = "secondary";
    resetButton.textContent = "花壇を整える";
    resetButton.onclick = resetGardenPlot;
    gardenActions.appendChild(resetButton);
  }

  function advanceGarden() {
    const today = getLocalDateString(new Date());
    const beforeStage = gardenStage;

    if (gardenStage <= 0) {
      gardenStage = 1;
      gardenCareDays = 0;
      gardenLastWaterDate = "";
      if (gardenLog) gardenLog.textContent = "サリム「月白花の種をまいたな。ここからは、水をやった日だけ少しずつ育つ。焦らず世話してやれ」";
    } else if (gardenStage < GARDEN_STAGES.length - 1) {
      if (gardenLastWaterDate === today) {
        if (gardenLog) gardenLog.textContent = "サリム「今日はもう水をやっただろ。やりすぎても花が驚く。続きはまた明日だな」";
        renderGardenGame();
        saveOutingData();
        return;
      }

      gardenLastWaterDate = today;
      gardenWaterCount += 1;
      gardenCareDays += 1;
      gardenStage = getGardenStageFromCareDays();

      if (gardenLog) {
        if (gardenStage > beforeStage) {
          if (gardenStage === 2) gardenLog.textContent = "サリム「芽が出たぞ。小さいが、ちゃんと生きてるんだな」";
          else if (gardenStage === 3) gardenLog.textContent = "サリム「葉が増えてきた。お前、なかなか世話が上手いじゃないか」";
          else if (gardenStage === 4) gardenLog.textContent = "サリム「月白花のつぼみだ。ここまで来ると、咲くのが楽しみになるな」";
          else if (gardenStage === 5) gardenLog.textContent = "サリム「咲いたな。月白花……王宮の庭にもよく似合う、いい花だ」";
        } else {
          gardenLog.textContent = "サリム「水やり完了だ。今日の世話はこれで十分だな。少しずつ育っているぞ」";
        }
      }
    } else {
      gardenHarvestCount += 1;
      const souvenir = getSouvenirById("palaceFlowerBookmark");
      let rewardText = "";
      if (souvenir && isSouvenirImplemented(souvenir.id) && !ownedSouvenirs[souvenir.id]) {
        grantSouvenir(souvenir);
        addAffinity(180);
        rewardText = "\n\n王宮庭園の月白花押し栞 を手に入れた。\n🎁 " + souvenir.name + "｜💖 +180";
        messageTitle.textContent = "新しいお土産を入手しました";
        messageMain.textContent = "「月白花を気に入ったなら、これを持って帰るといい」";
        messageReward.textContent = "🎁 " + souvenir.name + "｜💖 +180";
      } else {
        addAffinity(80);
        rewardText = "\n\n月白花を収穫しました。💖 +80";
        messageTitle.textContent = "月白花を収穫しました";
        messageMain.textContent = "「綺麗に咲いたな。お前が育てた月白花だと思うと、少し特別に見える」";
        messageReward.textContent = "💖 +80";
      }
      if (gardenLog) gardenLog.textContent = "サリム「よく育てたな。次の月白花も、また一緒に見に来るか」" + rewardText;
      gardenStage = 0;
      gardenCareDays = 0;
      gardenLastWaterDate = "";
    }

    eventHistory.push({
      date: getLocalDateString(new Date()),
      placeId: "palaceGarden",
      type: "garden",
      title: gardenStage === 0 && beforeStage === 5 ? "月白花を収穫しました" : "王宮前庭園の花壇を世話しました"
    });

    saveOutingData();
    updateStatus();
    renderSouvenirs();
    renderGardenGame();
  }

  function resetGardenPlot() {
    const ok = window.confirm("花壇を空の状態に戻しますか？\n成長中の月白花はリセットされます。");
    if (!ok) return;
    gardenStage = 0;
    gardenCareDays = 0;
    gardenLastWaterDate = "";
    if (gardenLog) gardenLog.textContent = "サリム「花壇を整え直したぞ。最初から育て直そう」";
    saveOutingData();
    renderGardenGame();
  }


  function startMiniGame(placeId) {
    const config = MINI_GAMES[placeId];
    const place = getPlaceById(placeId);
    if (!config || !place) return;

    outingStage.style.backgroundImage = "linear-gradient(rgba(255,250,240,0.06), rgba(255,250,240,0.06)), url('" + place.image + "')";
    placeLabel.textContent = place.name;
    if (outingNoteText) outingNoteText.textContent = place.miniNote || "ミニゲームでお土産を探してみましょう。";

    miniGameTitle.textContent = config.title;
    openModal("miniGameMenu");

    if (config.type === "memory") {
      startMemoryGame(config, place);
      return;
    }

    if (config.type === "starCards") {
      startStarCardsGame(config, place);
      return;
    }

    if (config.type === "gemMatch") {
      startGemMatchGame(config, place);
      return;
    }

    const questions = shuffleArray(config.questions).slice(0, 3);
    currentMiniGame = {
      type: "quiz",
      config: config,
      place: place,
      questions: questions,
      index: 0,
      correct: 0
    };

    renderMiniGameQuestion();
  }

  function startMemoryGame(config, place) {
    const baseCards = config.cardSouvenirIds
      .map(function(id) { return getSouvenirById(id); })
      .filter(Boolean);

    const cards = shuffleArray(baseCards.concat(baseCards).map(function(souvenir, index) {
      return {
        uid: souvenir.id + "-" + index,
        souvenirId: souvenir.id,
        image: souvenir.image,
        name: souvenir.name,
        flipped: false,
        matched: false
      };
    }));

    currentMiniGame = {
      type: "memory",
      config: config,
      place: place,
      cards: cards,
      selectedCards: [],
      moves: 0,
      matchedPairs: 0,
      locked: false
    };

    renderMemoryGame();
  }

  function renderMemoryGame() {
    if (!currentMiniGame || currentMiniGame.type !== "memory") return;
    const game = currentMiniGame;
    const config = game.config;

    miniGameStatus.textContent = config.intro + "\n手数：" + game.moves + " / " + config.handLimit + "｜そろえた数：" + game.matchedPairs + " / " + (game.cards.length / 2);
    miniGameQuestion.textContent = "同じお土産のカードを2枚そろえてください。";
    miniGameChoices.innerHTML = "";

    const board = document.createElement("div");
    board.className = "memory-game-board";

    game.cards.forEach(function(card, index) {
      const button = document.createElement("button");
      button.type = "button";
      button.className = "memory-card" + (card.flipped ? " flipped" : "") + (card.matched ? " matched" : "");
      button.setAttribute("aria-label", card.flipped || card.matched ? card.name : "伏せられたカード");
      button.onclick = function() { flipMemoryCard(index); };

      if (card.flipped || card.matched) {
        const img = document.createElement("img");
        img.src = card.image;
        img.alt = card.name;
        button.appendChild(img);
      } else {
        button.textContent = "✦";
      }

      board.appendChild(button);
    });

    const note = document.createElement("div");
    note.className = "memory-result-note";
    note.textContent = "8手以内にクリアすると、香油通りのお土産入手チャンス。";

    miniGameChoices.appendChild(board);
    miniGameChoices.appendChild(note);
  }

  function flipMemoryCard(index) {
    if (!currentMiniGame || currentMiniGame.type !== "memory") return;
    const game = currentMiniGame;
    if (game.locked) return;

    const card = game.cards[index];
    if (!card || card.flipped || card.matched) return;

    card.flipped = true;
    game.selectedCards.push(index);
    renderMemoryGame();

    if (game.selectedCards.length < 2) return;

    game.moves += 1;
    const first = game.cards[game.selectedCards[0]];
    const second = game.cards[game.selectedCards[1]];

    if (first.souvenirId === second.souvenirId) {
      first.matched = true;
      second.matched = true;
      game.selectedCards = [];
      game.matchedPairs += 1;
      renderMemoryGame();

      if (game.matchedPairs >= game.cards.length / 2) {
        setTimeout(finishMemoryGame, 350);
      }
    } else {
      game.locked = true;
      setTimeout(function() {
        first.flipped = false;
        second.flipped = false;
        game.selectedCards = [];
        game.locked = false;
        renderMemoryGame();
      }, 700);
    }
  }

  function finishMemoryGame() {
    if (!currentMiniGame || currentMiniGame.type !== "memory") return;

    const game = currentMiniGame;
    const config = game.config;
    const place = game.place;
    const success = game.moves <= config.handLimit;
    closeModal("miniGameMenu");

    let title = success ? "絵合わせ成功！" : "絵合わせクリア";
    let mainText = "";
    let rewardText = "";
    let historyType = success ? "memory-success" : "memory-clear";

    if (success) {
      const unownedHere = getSouvenirsByPlace(place.id).filter(function(item) {
        return isSouvenirImplemented(item.id) && !ownedSouvenirs[item.id];
      });
      if (unownedHere.length > 0) {
        const souvenir = pickRandom(unownedHere);
        grantSouvenir(souvenir);
        addAffinity(150);
        mainText = config.successLine + "\n\n" + souvenir.name + " を手に入れた。";
        rewardText = "🎁 " + souvenir.name + "｜手数 " + game.moves + "｜💖 +150";
        historyType = "memory-souvenir";
      } else {
        addAffinity(120);
        mainText = config.successLine + "\n\n香油通りのお土産は、もう全部集めている。";
        rewardText = "お土産コンプリート済み｜手数 " + game.moves + "｜💖 +120";
      }
    } else {
      addAffinity(50);
      mainText = config.slowClearLine + "\n\n8手以内なら、お土産が見つかるかもしれない。";
      rewardText = "手数 " + game.moves + "｜💖 +50";
    }

    messageTitle.textContent = title;
    messageMain.textContent = mainText;
    messageReward.textContent = rewardText;

    eventHistory.push({
      date: getLocalDateString(new Date()),
      placeId: place.id,
      type: historyType,
      title: title
    });

    currentMiniGame = null;
    saveOutingData();
    updateStatus();
    renderSouvenirs();
  }

  const GEM_TYPES = ["ruby", "sapphire", "emerald", "amethyst", "citrine", "aquamarine"];

  function randomGemType() {
    return GEM_TYPES[Math.floor(Math.random() * GEM_TYPES.length)];
  }

  function createGemBoard(rows, columns) {
    let board;
    do {
      board = [];
      for (let row = 0; row < rows; row += 1) {
        board[row] = [];
        for (let column = 0; column < columns; column += 1) {
          let type;
          do {
            type = randomGemType();
          } while ((column >= 2 && board[row][column - 1] === type && board[row][column - 2] === type) || (row >= 2 && board[row - 1][column] === type && board[row - 2][column] === type));
          board[row][column] = type;
        }
      }
    } while (!hasGemMove(board));
    return board;
  }

  function startGemMatchGame(config, place) {
    currentMiniGame = {
      type: "gemMatch", config: config, place: place,
      board: createGemBoard(config.rows, config.columns),
      moves: 0, score: 0, selected: null, locked: false,
      message: "宝石をひとつ選んで、隣の宝石を選んで入れ替えよう。"
    };
    renderGemMatchGame();
  }

  function renderGemMatchGame() {
    if (!currentMiniGame || currentMiniGame.type !== "gemMatch") return;
    const game = currentMiniGame;
    const config = game.config;
    miniGameStatus.textContent = config.intro + "\n手数：" + game.moves + " / " + config.moveLimit + "｜得点：" + game.score + " / " + config.targetScore;
    miniGameQuestion.textContent = game.message;
    miniGameChoices.innerHTML = "";

    const gameArea = document.createElement("div");
    gameArea.className = "gem-match-game";
    const score = document.createElement("div");
    score.className = "gem-match-score";
    score.innerHTML = "手数 <strong>" + game.moves + " / " + config.moveLimit + "</strong>　得点 <strong>" + game.score + " / " + config.targetScore + "</strong>";
    gameArea.appendChild(score);

    const board = document.createElement("div");
    board.className = "gem-match-board";
    game.board.forEach(function(row, rowIndex) {
      row.forEach(function(type, columnIndex) {
        const index = rowIndex * config.columns + columnIndex;
        const button = document.createElement("button");
        button.type = "button";
        button.className = "gem-tile" + (game.selected === index ? " selected" : "");
        button.disabled = game.locked;
        button.setAttribute("aria-label", "宝石");
        button.onclick = function() { selectGem(index); };
        const gem = document.createElement("span");
        gem.className = "gem-piece gem-" + type;
        gem.setAttribute("aria-hidden", "true");
        button.appendChild(gem);
        board.appendChild(button);
      });
    });
    gameArea.appendChild(board);
    const note = document.createElement("div");
    note.className = "gem-match-note";
    note.textContent = "3個以上そろう入れ替えだけが手数に数えられます。連鎖すると得点アップ。";
    gameArea.appendChild(note);
    miniGameChoices.appendChild(gameArea);
  }

  function gemPosition(index, columns) {
    return { row: Math.floor(index / columns), column: index % columns };
  }

  function areGemsAdjacent(firstIndex, secondIndex, columns) {
    const first = gemPosition(firstIndex, columns);
    const second = gemPosition(secondIndex, columns);
    return Math.abs(first.row - second.row) + Math.abs(first.column - second.column) === 1;
  }

  function swapGems(board, firstIndex, secondIndex, columns) {
    const first = gemPosition(firstIndex, columns);
    const second = gemPosition(secondIndex, columns);
    const temp = board[first.row][first.column];
    board[first.row][first.column] = board[second.row][second.column];
    board[second.row][second.column] = temp;
  }

  function findGemMatches(board) {
    const matches = new Set();
    const rows = board.length;
    const columns = board[0].length;
    for (let row = 0; row < rows; row += 1) {
      let start = 0;
      while (start < columns) {
        let end = start + 1;
        while (end < columns && board[row][end] === board[row][start]) end += 1;
        if (end - start >= 3) for (let column = start; column < end; column += 1) matches.add(row + ":" + column);
        start = end;
      }
    }
    for (let column = 0; column < columns; column += 1) {
      let start = 0;
      while (start < rows) {
        let end = start + 1;
        while (end < rows && board[end][column] === board[start][column]) end += 1;
        if (end - start >= 3) for (let row = start; row < end; row += 1) matches.add(row + ":" + column);
        start = end;
      }
    }
    return matches;
  }

  function hasGemMove(board) {
    const rows = board.length;
    const columns = board[0].length;
    for (let row = 0; row < rows; row += 1) {
      for (let column = 0; column < columns; column += 1) {
        const firstIndex = row * columns + column;
        const neighbors = [];
        if (column + 1 < columns) neighbors.push(firstIndex + 1);
        if (row + 1 < rows) neighbors.push(firstIndex + columns);
        for (let i = 0; i < neighbors.length; i += 1) {
          swapGems(board, firstIndex, neighbors[i], columns);
          const createsMatch = findGemMatches(board).size > 0;
          swapGems(board, firstIndex, neighbors[i], columns);
          if (createsMatch) return true;
        }
      }
    }
    return false;
  }

  function clearAndRefillGems(game, matches) {
    const rows = game.config.rows;
    const columns = game.config.columns;
    matches.forEach(function(key) {
      const parts = key.split(":");
      game.board[Number(parts[0])][Number(parts[1])] = null;
    });
    for (let column = 0; column < columns; column += 1) {
      const remaining = [];
      for (let row = rows - 1; row >= 0; row -= 1) if (game.board[row][column]) remaining.push(game.board[row][column]);
      for (let row = rows - 1, index = 0; row >= 0; row -= 1, index += 1) game.board[row][column] = index < remaining.length ? remaining[index] : randomGemType();
    }
  }

  function resolveGemMatches(game, cascade) {
    const matches = findGemMatches(game.board);
    if (matches.size === 0) return cascade;
    game.score += matches.size * 50 * cascade;
    clearAndRefillGems(game, matches);
    return resolveGemMatches(game, cascade + 1);
  }

  function selectGem(index) {
    if (!currentMiniGame || currentMiniGame.type !== "gemMatch") return;
    const game = currentMiniGame;
    if (game.locked) return;
    if (game.selected === null) {
      game.selected = index;
      game.message = "隣り合う宝石をもうひとつ選んで入れ替えよう。";
      renderGemMatchGame();
      return;
    }
    if (game.selected === index) {
      game.selected = null;
      game.message = "選択を取り消したよ。宝石をひとつ選ぼう。";
      renderGemMatchGame();
      return;
    }
    if (!areGemsAdjacent(game.selected, index, game.config.columns)) {
      game.selected = index;
      game.message = "隣り合う宝石だけを入れ替えられるよ。選び直そう。";
      renderGemMatchGame();
      return;
    }
    const first = game.selected;
    swapGems(game.board, first, index, game.config.columns);
    const matches = findGemMatches(game.board);
    if (matches.size === 0) {
      swapGems(game.board, first, index, game.config.columns);
      game.selected = null;
      game.message = "3個そろわない組み合わせだよ。別の場所を試してみよう。";
      renderGemMatchGame();
      return;
    }
    game.moves += 1;
    game.selected = null;
    game.locked = true;
    const cascade = resolveGemMatches(game, 1);
    game.message = cascade > 2 ? "きれいな連鎖！ 水面が宝石の光で揺れている。" : "宝石がそろった！ 次の組み合わせを探そう。";
    renderGemMatchGame();
    setTimeout(function() {
      if (!currentMiniGame || currentMiniGame.type !== "gemMatch") return;
      game.locked = false;
      if (game.score >= game.config.targetScore || game.moves >= game.config.moveLimit) finishGemMatchGame();
      else renderGemMatchGame();
    }, 280);
  }

  function finishGemMatchGame() {
    if (!currentMiniGame || currentMiniGame.type !== "gemMatch") return;
    const game = currentMiniGame;
    const config = game.config;
    const place = game.place;
    const success = game.score >= config.targetScore;
    closeModal("miniGameMenu");
    let title = success ? "宝石合わせ 成功！" : "宝石合わせ 終了";
    let mainText = "";
    let rewardText = "";
    let historyType = success ? "gem-match-success" : "gem-match-fail";
    if (success) {
      const unownedHere = getSouvenirsByPlace(place.id).filter(function(item) { return isSouvenirImplemented(item.id) && !ownedSouvenirs[item.id]; });
      if (unownedHere.length > 0) {
        const souvenir = pickRandom(unownedHere);
        grantSouvenir(souvenir);
        addAffinity(150);
        mainText = config.successLine + "\n\n" + souvenir.name + " を手に入れた。";
        rewardText = "🎁 " + souvenir.name + "｜" + game.moves + "手｜💖 +150";
        historyType = "gem-match-souvenir";
      } else {
        addAffinity(120);
        mainText = config.successLine + "\n\n水鏡の回廊のお土産は、もう全部集めている。";
        rewardText = "お土産コンプリート済み｜💖 +120";
      }
    } else {
      addAffinity(35);
      mainText = config.failLine;
      rewardText = "得点 " + game.score + "｜💖 +35";
    }
    messageTitle.textContent = title;
    messageMain.textContent = mainText;
    messageReward.textContent = rewardText;
    eventHistory.push({ date: getLocalDateString(new Date()), placeId: place.id, type: historyType, title: title });
    currentMiniGame = null;
    saveOutingData();
    updateStatus();
    renderSouvenirs();
  }

  function getStarCardById(cardId) {
    return STAR_CARDS.find(function(card) { return card.id === cardId; }) || null;
  }

  function getStarCardTurnNumber(game) {
    return game.playerWins + game.salimWins + 1;
  }

    currentMiniGame = {
      type: "starCards",
      config: config,
      place: place,

  function createStarCard(card, owner, selectable) {
    const element = document.createElement(selectable ? "button" : "div");
    if (selectable) element.type = "button";
    element.className = "star-card star-card-" + card.id;
    element.setAttribute("aria-label", owner + "の" + card.name + "札");

    label.textContent = card.name + "札";

    element.appendChild(ownerLabel);
    element.appendChild(symbol);
    element.appendChild(label);
    return element;
  }

  function createStarCardBack() {
    const element = document.createElement("div");
    element.className = "star-card star-card-back";
    element.setAttribute("aria-label", "サリムの伏せられた札");

    const mark = document.createElement("div");
    mark.className = "star-card-back-mark";
    mark.setAttribute("aria-hidden", "true");

    const label = document.createElement("div");
    label.className = "star-card-label";
    label.textContent = "伏せ札";

    element.appendChild(mark);
    element.appendChild(label);
    return element;
  }

  function renderStarCardsGame() {
    if (!currentMiniGame || currentMiniGame.type !== "starCards") return;
    const game = currentMiniGame;
    const config = game.config;
    const finalRound = game.playerWins >= 2 || game.salimWins >= 2;

    miniGameStatus.textContent = config.intro + "\nあなた " + game.playerWins + "勝 ｜ サリム " + game.salimWins + "勝";
    miniGameQuestion.textContent = "太陽は星に勝ち、星は月に勝ち、月は太陽に勝つ。\n同じ札ならあいこ。もう一度札を出します。";
    miniGameChoices.innerHTML = "";

    const gameArea = document.createElement("div");
    gameArea.className = "star-card-game";

    const score = document.createElement("div");
    score.className = "star-card-score";
    score.innerHTML = "あなた <strong>" + game.playerWins + "</strong> 勝　—　サリム <strong>" + game.salimWins + "</strong> 勝";
    gameArea.appendChild(score);

    if (game.state === "choose") {
      const hint = document.createElement("div");
      hint.className = "star-card-hint";
      hint.textContent = "第" + getStarCardTurnNumber(game) + "勝負\n" + game.salimCard.hint + "\n\nどの札を出す？";
      gameArea.appendChild(hint);

      const backArea = document.createElement("div");
      backArea.className = "star-card-reveal";
      backArea.appendChild(createStarCardBack());
      gameArea.appendChild(backArea);

      const hand = document.createElement("div");
      hand.className = "star-card-hand";
      shuffleArray(STAR_CARDS).forEach(function(card) {
        const button = createStarCard(card, "あなた", true);
        button.onclick = function() { playStarCard(card.id); };
        hand.appendChild(button);
      });
      gameArea.appendChild(hand);
    } else {
      const result = document.createElement("div");
      result.className = "star-card-result";
      result.textContent = game.resultText;
      gameArea.appendChild(result);

      const reveal = document.createElement("div");
      reveal.className = "star-card-reveal";
      reveal.appendChild(createStarCard(game.playerCard, "あなた", false));
      reveal.appendChild(createStarCard(game.salimCard, "サリム", false));
      gameArea.appendChild(reveal);

      const nextButton = document.createElement("button");
      nextButton.type = "button";
      if (finalRound) {
        nextButton.textContent = "結果を見る";
        nextButton.onclick = finishStarCardsGame;
      } else {
        nextButton.textContent = game.playerCard.id === game.salimCard.id ? "もう一度札を出す" : "次の勝負へ";
        nextButton.onclick = startNextStarCardTurn;
      }
      gameArea.appendChild(nextButton);
    }

    miniGameChoices.appendChild(gameArea);
  }

  function playStarCard(cardId) {
    if (!currentMiniGame || currentMiniGame.type !== "starCards" || currentMiniGame.state !== "choose") return;
    const game = currentMiniGame;
    const playerCard = getStarCardById(cardId);
    if (!playerCard || !game.salimCard) return;

    game.playerCard = playerCard;
    game.state = "result";

    if (playerCard.id === game.salimCard.id) {
      game.resultText = "あいこ！\nサリム「同じ札か。気が合うな……だが、勝負は決まっていない」";
    } else if (playerCard.beats === game.salimCard.id) {
      game.playerWins += 1;
      game.resultText = "あなたの勝ち！\nサリム「なるほど。俺の言葉を、ちゃんと聞いていたわけだ」";
    } else {
      game.salimWins += 1;
      game.resultText = "サリムの勝ち。\nサリム「惜しいな。だが、次はどう出る？」";
    }

    renderStarCardsGame();
  }

  function startNextStarCardTurn() {
    if (!currentMiniGame || currentMiniGame.type !== "starCards") return;
    currentMiniGame.state = "choose";
    currentMiniGame.playerCard = null;
    currentMiniGame.salimCard = pickRandom(STAR_CARDS);
    currentMiniGame.resultText = "";
    renderStarCardsGame();
  }

  function finishStarCardsGame() {
    if (!currentMiniGame || currentMiniGame.type !== "starCards") return;

    const game = currentMiniGame;
    const config = game.config;
    const place = game.place;
    const success = game.playerWins >= 2;
    closeModal("miniGameMenu");

    let title = success ? "星巡り札 勝利！" : "星巡り札 終了";
    let mainText = "";
    let rewardText = "";
    let historyType = success ? "star-cards-success" : "star-cards-fail";

    if (success) {
      const unownedHere = getSouvenirsByPlace(place.id).filter(function(item) {
        return isSouvenirImplemented(item.id) && !ownedSouvenirs[item.id];
      });
      if (unownedHere.length > 0) {
        const souvenir = pickRandom(unownedHere);
        grantSouvenir(souvenir);
        addAffinity(150);
        mainText = config.successLine + "\n\n" + souvenir.name + " を手に入れた。";
        rewardText = "🎁 " + souvenir.name + "｜💖 +150";
        historyType = "star-cards-souvenir";
      } else {
        addAffinity(120);
        mainText = config.successLine + "\n\n星見の丘のお土産は、もう全部集めている。";
        rewardText = "お土産コンプリート済み｜💖 +120";
      }
    } else {
      addAffinity(30);
      mainText = config.failLine;
      rewardText = "💖 +30";
    }

    messageTitle.textContent = title;
    messageMain.textContent = mainText;
    messageReward.textContent = rewardText;

    eventHistory.push({
      date: getLocalDateString(new Date()),
      placeId: place.id,
      type: historyType,
      title: title
    });

    currentMiniGame = null;
    saveOutingData();
    updateStatus();
    renderSouvenirs();
  }

  function renderMiniGameQuestion() {
    if (!currentMiniGame) return;
    const config = currentMiniGame.config;

    if (currentMiniGame.index >= currentMiniGame.questions.length) {
      finishMiniGame();
      return;
    }

    const question = currentMiniGame.questions[currentMiniGame.index];
    miniGameStatus.textContent = config.intro + "\n" + (currentMiniGame.index + 1) + "問目 / " + currentMiniGame.questions.length + "｜正解 " + currentMiniGame.correct + "問";
    miniGameQuestion.textContent = question.text;
    miniGameChoices.innerHTML = "";

    question.choices.forEach(function(choice, choiceIndex) {
      const button = document.createElement("button");
      button.type = "button";
      button.textContent = choice;
      button.onclick = function() { answerMiniGame(choiceIndex); };
      miniGameChoices.appendChild(button);
    });
  }

  function answerMiniGame(choiceIndex) {
    if (!currentMiniGame) return;
    const question = currentMiniGame.questions[currentMiniGame.index];
    if (choiceIndex === question.answer) currentMiniGame.correct += 1;
    currentMiniGame.index += 1;
    renderMiniGameQuestion();
  }

  function finishMiniGame() {
    if (!currentMiniGame) return;

    const config = currentMiniGame.config;
    const place = currentMiniGame.place;
    const success = currentMiniGame.correct >= config.successNeed;
    closeModal("miniGameMenu");

    let title = success ? "ミニゲーム成功！" : "ミニゲーム失敗";
    let mainText = "";
    let rewardText = "";
    let historyType = success ? "minigame-success" : "minigame-fail";

    if (success) {
      const unownedHere = getSouvenirsByPlace(place.id).filter(function(item) {
        return isSouvenirImplemented(item.id) && !ownedSouvenirs[item.id];
      });
      if (unownedHere.length > 0) {
        const souvenir = pickRandom(unownedHere);
        grantSouvenir(souvenir);
        addAffinity(150);
        mainText = config.successLine + "\n\n" + souvenir.name + " を手に入れた。";
        rewardText = "🎁 " + souvenir.name + "｜💖 +150";
        historyType = "minigame-souvenir";
      } else {
        addAffinity(120);
        mainText = config.successLine + "\n\nこの場所のお土産は、もう全部集めている。";
        rewardText = "お土産コンプリート済み｜💖 +120";
      }
    } else {
      addAffinity(30);
      mainText = config.failLine;
      rewardText = "💖 +30";
    }

    messageTitle.textContent = title;
    messageMain.textContent = mainText;
    messageReward.textContent = rewardText;

    eventHistory.push({
      date: getLocalDateString(new Date()),
      placeId: place.id,
      type: historyType,
      title: title
    });

    currentMiniGame = null;
    saveOutingData();
    updateStatus();
    renderSouvenirs();
  }

  function grantSouvenir(souvenir) {
    ownedSouvenirs[souvenir.id] = {
      id: souvenir.id,
      date: getLocalDateString(new Date()),
      placeId: souvenir.placeId,
      placeName: souvenir.placeName
    };
    souvenirDates[souvenir.id] = ownedSouvenirs[souvenir.id].date;
  }

  function shuffleArray(array) {
    const copy = array.slice();
    for (let i = copy.length - 1; i > 0; i--) {
      const j = Math.floor(Math.random() * (i + 1));
      const temp = copy[i];
      copy[i] = copy[j];
      copy[j] = temp;
    }
    return copy;
  }

  function selectPlace(placeId) {
    const place = getPlaceById(placeId);
    if (!place) return;
    selectedPlaceId = place.id;
    lastPlace = place.id;
    outingStage.style.backgroundImage = "linear-gradient(rgba(255,250,240,0.06), rgba(255,250,240,0.06)), url('" + place.image + "')";
    placeLabel.textContent = place.name;
    if (outingNoteText) outingNoteText.textContent = place.miniNote || "サリムと一緒に、ラズレムの街を散策中です。";
    eventCharacter.classList.remove("visible");
    eventCharacter.src = "";
    eventCharacter.alt = "";
    messageTitle.textContent = place.shortName;
    messageMain.textContent = "「ここが" + place.shortName + "だ。さて、どう楽しむ？」";
    messageReward.textContent = place.id === "palaceGarden" ? "散策するか、花を育てられます。" : "散策するか、ミニゲームを遊べます。";
    showPlaceScreen();
    renderPlaces();
    renderSelectedPlacePanel();
    saveOutingData();
  }

  function showMapScreen() {
    if (mapPanel) mapPanel.style.display = "";
    if (placeView) placeView.classList.remove("active");
    messageTitle.textContent = "ラズレム散策マップ";
    messageMain.textContent = "「さて、どこへ行きたい？　俺が案内してやる」";
    messageReward.textContent = "マップ上の行き先を選んでください。";
  }

  function showPlaceScreen() {
    if (mapPanel) mapPanel.style.display = "none";
    if (placeView) placeView.classList.add("active");
  }

  function renderSelectedPlacePanel() {
    if (!selectedPlacePanel) return;
    const place = getPlaceById(selectedPlaceId) || PLACES[0];
    if (!place) return;

    selectedPlacePanel.innerHTML = "";

    const title = document.createElement("div");
    title.className = "selected-place-title";
    title.textContent = place.name;

    const desc = document.createElement("div");
    desc.className = "selected-place-desc";
    desc.textContent = place.desc;

    const actions = document.createElement("div");
    actions.className = "selected-place-actions";

    const visitButton = document.createElement("button");
    visitButton.type = "button";
    visitButton.textContent = "散策する";
    visitButton.onclick = function() { visitPlace(place.id); };
    actions.appendChild(visitButton);

    if (place.id === "palaceGarden") {
      const gardenButton = document.createElement("button");
      gardenButton.type = "button";
      gardenButton.className = "mini-game-button";
      gardenButton.textContent = "花を育てる";
      gardenButton.onclick = function() { openGardenGame(); };
      actions.appendChild(gardenButton);
    }

    if (MINI_GAMES[place.id]) {
      const miniButton = document.createElement("button");
      miniButton.type = "button";
      miniButton.className = "mini-game-button";
      miniButton.textContent = "ミニゲーム";
      miniButton.onclick = function() { startMiniGame(place.id); };
      actions.appendChild(miniButton);
    }

    selectedPlacePanel.appendChild(title);
    selectedPlacePanel.appendChild(desc);
    selectedPlacePanel.appendChild(actions);
  }

  function renderPlaces() {
    placeGrid.innerHTML = "";
    PLACES.forEach(function(place) {
      const pos = MAP_POSITIONS[place.id] || { left: 50, top: 50 };
      const button = document.createElement("button");
      button.type = "button";
      button.className = "map-pin" + (place.id === selectedPlaceId ? " selected" : "");
      button.textContent = place.shortName;
      button.style.left = pos.left + "%";
      button.style.top = pos.top + "%";
      button.onclick = function() { selectPlace(place.id); };
      placeGrid.appendChild(button);
    });
  }

  function updateStatus() {
    const level = getLevel();
    levelBox.textContent = "Lv." + level + "｜" + getRelationshipName(level);
    outingCountText.textContent = formatNumber(outingCount);
    souvenirCountText.textContent = getOwnedSouvenirCount() + " / " + getImplementedSouvenirCount();
    souvenirSummary.textContent = "集めたお土産：" + getOwnedSouvenirCount() + " / " + getImplementedSouvenirCount() + "（未実装のお土産は今後追加予定）";
  }

  function renderSouvenirs() {
    if (!souvenirGrid) return;
    souvenirGrid.innerHTML = "";
    SOUVENIRS.forEach(function(souvenir) {
      const record = ownedSouvenirs[souvenir.id];
      const implemented = isSouvenirImplemented(souvenir.id);
      const owned = Boolean(record) && implemented;

      const card = document.createElement("div");
      card.className = "souvenir-card" + (owned ? "" : " locked");

      const icon = document.createElement("div");
      icon.className = "souvenir-icon";
      if (owned) {
        const img = document.createElement("img");
        img.src = souvenir.image;
        img.alt = souvenir.name;
        icon.appendChild(img);
        icon.onclick = function() { openSouvenirViewer(souvenir.id); };
      } else {
        icon.textContent = "？";
      }

      const body = document.createElement("div");
      const name = document.createElement("div");
      name.className = "souvenir-name";
      name.textContent = owned ? souvenir.name : "？？？";
      const meta = document.createElement("div");
      meta.className = "souvenir-meta";
      meta.textContent = owned ? "入手日：" + record.date + "｜" + souvenir.placeName : (implemented ? "入手場所：" + souvenir.placeName : "未実装：今後のアップデートで入手可能予定");
      const desc = document.createElement("div");
      desc.className = "souvenir-desc";
      desc.textContent = owned ? souvenir.description : (implemented ? getImplementedSouvenirHint(souvenir) : "まだ入手できません。");
      const comment = document.createElement("div");
      comment.className = "souvenir-comment";
      comment.textContent = owned ? "「" + souvenir.comment + "」" : "「？？？」";

      body.appendChild(name);
      body.appendChild(meta);
      body.appendChild(desc);
      body.appendChild(comment);
      card.appendChild(icon);
      card.appendChild(body);

      if (owned) {
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = "大きく見る";
        button.onclick = function() { openSouvenirViewer(souvenir.id); };
        card.appendChild(button);
      }

      souvenirGrid.appendChild(card);
    });
  }

  function getSouvenirById(souvenirId) {
    return SOUVENIRS.find(function(item) { return item.id === souvenirId; }) || null;
  }

  function openSouvenirViewer(souvenirId) {
    const souvenir = getSouvenirById(souvenirId);
    if (!souvenir || !isSouvenirImplemented(souvenirId) || !ownedSouvenirs[souvenirId]) return;
    viewerTitle.textContent = souvenir.name;
    viewerImage.src = souvenir.image;
    viewerImage.alt = souvenir.name;
    openModal("souvenirViewer");
  }

  function openSouvenirMenu() {
    renderSouvenirs();
    updateStatus();
    openModal("souvenirMenu");
  }

  function openModal(id) {
    const modal = document.getElementById(id);
    if (!modal) return;
    modal.classList.add("open");
    modal.setAttribute("aria-hidden", "false");
    document.body.style.overflow = "hidden";
  }

  function closeModal(id) {
    const modal = document.getElementById(id);
    if (!modal) return;
    modal.classList.remove("open");
    modal.setAttribute("aria-hidden", "true");
    if (!document.querySelector(".modal-overlay.open")) document.body.style.overflow = "";
  }

  function closeModalFromBackdrop(event, id) {
    if (event.target && event.target.id === id) closeModal(id);
  }

  function initialize() {
    renderSouvenirs();
    updateStatus();
    const initialPlace = getPlaceById(selectedPlaceId) || PLACES[0];
    if (initialPlace) {
      selectedPlaceId = initialPlace.id;
      outingStage.style.backgroundImage = 'url("' + initialPlace.image + '")';
      placeLabel.textContent = initialPlace.name;
      if (outingNoteText) outingNoteText.textContent = initialPlace.miniNote || "行き先を選ぶと、その場所の見どころが表示されます。";
    }
    renderPlaces();
    renderSelectedPlacePanel();
    showMapScreen();
  }

  initialize();
</script>
</body>
</html>
