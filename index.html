<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<meta name="apple-mobile-web-app-title" content="サリムのお部屋">
<link rel="apple-touch-icon" href="https://raw.githubusercontent.com/nonoygk/salim/main/ui/icon.jpg">
<link rel="icon" type="image/jpeg" href="https://raw.githubusercontent.com/nonoygk/salim/main/ui/icon.jpg">
<title>サリムのお部屋 〜王様のひとやすみ〜</title>
<style>
  :root {
    --navy: #17366f;
    --navy-light: #345c9d;
    --gold: #d6b15d;
    --text: #2d3d62;
    --muted: #8c8068;
  }

  * { box-sizing: border-box; }

  body {
    margin: 0;
    font-family: -apple-system, BlinkMacSystemFont, "Hiragino Sans", "Yu Gothic", sans-serif;
    background: #F0F8FF;
    color: var(--text);
    text-align: center;
  }

  .game {
    max-width: 960px;
    margin: auto;
    padding: 16px;
  }

  .title-logo {
    width: 580px;
    max-width: 96%;
    margin: 0 auto -18px;
    display: block;
  }

  .level-box {
    display: inline-block;
    margin: 0 auto 12px;
    padding: 8px 20px;
    background: rgba(255,255,255,0.86);
    border: 2px solid var(--gold);
    border-radius: 999px;
    box-shadow: 0 3px 8px rgba(0,0,0,0.05);
    color: var(--navy);
    font-weight: bold;
    font-size: 15px;
  }

  .room {
    position: relative;
    scroll-margin-top: 8px;
    width: 100%;
    aspect-ratio: 4 / 3;
    background-image:
      linear-gradient(rgba(255,250,240,0.04), rgba(255,250,240,0.04)),
      url("https://raw.githubusercontent.com/nonoygk/salim/main/backgrounds/salim-room.png");
    background-size: contain;
    background-position: center;
    background-repeat: no-repeat;
    background-origin: border-box;
    background-clip: border-box;
    background-color: #ead8bf;
    border: 3px solid var(--gold);
    border-radius: 24px;
    box-shadow: 0 7px 18px rgba(45,61,98,0.16);
    overflow: hidden;
  }

  .room-item {
    position: absolute;
    display: none;
    object-fit: contain;
    pointer-events: none;
    user-select: none;
    -webkit-user-drag: none;
  }

  .room-item.visible { display: block; }

  /* 背景画像と合成した完成イメージを基準に配置。
     微調整したい場合は、各アイテムの left / top / width を変更する。 */
  .item-kingdomMap { left: 70.0%; top: 34.0%; width: 12.5%; z-index: 1; }
  .item-starMoonTapestry { left: 17.0%; top: 23.5%; width: 11.5%; z-index: 1; }
  .item-relaxCushions { left: 9.5%; top: 48.0%; width: 15.0%; z-index: 2; }
  .item-goldIncenseBurner { left: 90.5%; top: 26.5%; width: 4.0%; z-index: 2; }
  .item-letterPile { left: 84.0%; top: 56.0%; width: 12.0%; z-index: 2; }
  .item-royalTeaTime { left: 59.5%; top: 48.5%; width: 31.0%; z-index: 3; }
  .item-razremPlanter { left: 28.0%; top: 40.0%; width: 14.5%; z-index: 1; }
  .item-blueGoldJewelBox { left: 7.5%; top: 60.0%; width: 18.0%; z-index: 3; }
  .item-starlightLantern { left: 78.5%; top: 42.8%; width: 7.0%; z-index: 2; }
  .item-starSandCelestialGlobe { left: 0.0%; top: 45.0%; width: 16.5%; z-index: 2; }

  .salim {
    position: absolute;
    left: 50%;
    bottom: 16%;
    transform: translateX(-50%);
    width: 27%;
    max-width: 300px;
    min-width: 150px;
    z-index: 4;
  }

  .salim img {
    display: block;
    width: 100%;
    filter: drop-shadow(0 8px 10px rgba(0,0,0,0.18));
  }

  .status-box {
    position: absolute;
    top: 2%;
    left: 2%;
    width: 55%;
    display: flex;
    align-items: center;
    gap: 13px;
    padding: 10px 14px;
    background: rgba(255,255,255,0.88);
    border: 1px solid rgba(214,177,93,0.72);
    border-radius: 16px;
    z-index: 6;
    box-shadow: 0 4px 10px rgba(0,0,0,0.07);
  }

  .points {
    min-width: 140px;
    margin: 0;
    color: var(--navy);
    font-size: 17px;
    font-weight: bold;
    white-space: nowrap;
  }

  .status-area {
    flex: 1;
    margin: 0;
    color: var(--text);
    font-size: 12px;
    font-weight: bold;
  }

  .bar {
    width: 100%;
    height: 12px;
    margin-top: 4px;
    overflow: hidden;
    background: #ebe3d3;
    border-radius: 999px;
  }

  .bar-fill {
    width: 100%;
    height: 100%;
    background: var(--navy-light);
    border-radius: 999px;
    transition: width 0.3s;
  }

  .mood-fill { background: #e2b857; }

  .title-badge-box {
    position: absolute;
    right: 2%;
    bottom: 2%;
    max-width: 40%;
    padding: 7px 14px;
    background: rgba(255,255,255,0.88);
    border: 2px solid var(--gold);
    border-radius: 18px;
    color: var(--navy);
    box-shadow: 0 4px 10px rgba(0,0,0,0.06);
    z-index: 6;
    line-height: 1.35;
  }

  .title-badge-label { font-size: 11px; font-weight: bold; }
  .title-badge-name { font-size: 13px; font-weight: bold; }

  .message {
    width: 100%;
    max-width: 760px;
    min-height: 82px;
    margin: 12px auto 14px;
    padding: 14px 18px;
    display: flex;
    align-items: center;
    justify-content: center;
    box-sizing: border-box;
    background: rgba(255,255,255,0.9);
    border: 2px solid var(--gold);
    border-radius: 18px;
    box-shadow: 0 4px 10px rgba(0,0,0,0.05);
    color: var(--text);
    font-size: 15px;
    line-height: 1.65;
    text-align: center;
    overflow-wrap: anywhere;
    white-space: pre-line;
  }

  .action-buttons {
    display: flex;
    flex-wrap: wrap;
    justify-content: center;
    gap: 8px;
    margin: 10px auto;
  }

  button {
    border: 1px solid rgba(214,177,93,0.88);
    border-radius: 999px;
    margin: 3px;
    padding: 10px 18px;
    background: var(--navy);
    color: white;
    font-size: 15px;
    box-shadow: 0 3px 7px rgba(23,54,111,0.15);
  }

  button:active { transform: translateY(1px); }
  .action-buttons button:active { transform: none; }

  button:disabled {
    background: #b5b0a5;
    border-color: #b5b0a5;
    box-shadow: none;
  }


  .gift-grid {
    width: 100%;
    max-width: 820px;
    margin: 8px auto 0;
    display: grid;
    grid-template-columns: repeat(3, minmax(0, 1fr));
    gap: 10px;
  }

  .gift-card {
    padding: 10px 8px 12px;
    background: rgba(255,255,255,0.82);
    border: 1px solid rgba(214,177,93,0.8);
    border-radius: 16px;
    box-shadow: 0 4px 10px rgba(45,61,98,0.06);
  }

  .gift-card img {
    width: 100%;
    max-width: 150px;
    aspect-ratio: 1 / 1;
    object-fit: contain;
    display: block;
    margin: 0 auto 5px;
  }

  .gift-name {
    min-height: 2.8em;
    display: flex;
    align-items: center;
    justify-content: center;
    color: var(--navy);
    font-size: 13px;
    font-weight: bold;
    line-height: 1.35;
  }

  .gift-effect {
    margin-top: 4px;
    color: var(--muted);
    font-size: 10px;
    line-height: 1.45;
  }

  .gift-card button {
    margin-top: 8px;
    padding: 7px 10px;
    font-size: 12px;
  }

  .item-grid {
    width: 100%;
    max-width: 820px;
    margin: 8px auto 0;
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
  }

  .item-card {
    display: grid;
    grid-template-columns: 78px minmax(0, 1fr) auto;
    grid-template-rows: auto auto;
    align-items: center;
    column-gap: 9px;
    padding: 7px 8px;
    background: rgba(255,255,255,0.82);
    border: 1px solid rgba(214,177,93,0.8);
    border-radius: 15px;
    box-shadow: 0 4px 10px rgba(45,61,98,0.06);
    text-align: left;
  }

  .item-card img {
    grid-row: 1 / 3;
    width: 74px;
    height: 74px;
    object-fit: contain;
    display: block;
  }

  .item-name {
    color: var(--navy);
    font-size: 13px;
    font-weight: bold;
    line-height: 1.35;
  }

  .item-cost {
    color: var(--muted);
    font-size: 11px;
    line-height: 1.35;
  }

  .item-card button {
    grid-column: 3;
    grid-row: 1 / 3;
    margin: 0;
    padding: 7px 9px;
    font-size: 11px;
    white-space: nowrap;
  }

  .achievement-summary {
    width: 100%;
    max-width: 760px;
    margin: 6px auto 8px;
    padding: 9px 12px;
    background: rgba(255,255,255,0.72);
    border: 1px solid rgba(214,177,93,0.72);
    border-radius: 14px;
    color: var(--navy);
    font-size: 13px;
    font-weight: bold;
  }

  .achievement-grid {
    width: 100%;
    max-width: 820px;
    margin: 8px auto 0;
    display: grid;
    grid-template-columns: repeat(2, minmax(0, 1fr));
    gap: 8px;
  }

  .achievement-card {
    padding: 10px 11px;
    background: rgba(255,255,255,0.82);
    border: 1px solid rgba(214,177,93,0.8);
    border-radius: 15px;
    box-shadow: 0 4px 10px rgba(45,61,98,0.06);
    text-align: left;
  }

  .achievement-card.locked { opacity: 0.68; }

  .achievement-top {
    display: flex;
    align-items: center;
    gap: 6px;
    color: var(--navy);
    font-size: 13px;
    font-weight: bold;
  }

  .achievement-desc,
  .achievement-progress {
    margin-top: 4px;
    color: var(--muted);
    font-size: 11px;
    line-height: 1.45;
  }

  .achievement-card button {
    margin: 7px 0 0;
    padding: 6px 10px;
    font-size: 11px;
  }

  .achievement-toast {
    position: fixed;
    left: 50%;
    top: 14px;
    z-index: 100;
    max-width: min(90vw, 460px);
    padding: 10px 16px;
    transform: translate(-50%, -18px);
    opacity: 0;
    pointer-events: none;
    background: rgba(255,250,240,0.96);
    border: 2px solid var(--gold);
    border-radius: 999px;
    box-shadow: 0 8px 20px rgba(45,61,98,0.2);
    color: var(--navy);
    font-size: 13px;
    font-weight: bold;
    transition: opacity 0.25s, transform 0.25s;
  }

  .achievement-toast.show {
    opacity: 1;
    transform: translate(-50%, 0);
  }


  /* スマホゲーム風のメニュー。通常画面は部屋を中心に保ち、
     一覧は全画面オーバーレイ内だけでスクロールさせる。 */
  body.menu-open {
    overflow: hidden;
  }

  .menu-launch-buttons {
    width: min(100%, 760px);
    margin: 10px auto 0;
    display: grid;
    grid-template-columns: repeat(4, minmax(0, 1fr));
    gap: 8px;
  }

  .menu-launch-button {
    min-width: 0;
    margin: 0;
    padding: 10px 8px;
    display: flex;
    flex-direction: column;
    align-items: center;
    justify-content: center;
    gap: 2px;
    background: rgba(255,255,255,0.9);
    border: 2px solid var(--gold);
    border-radius: 16px;
    color: var(--navy);
    font-weight: bold;
    box-shadow: 0 4px 10px rgba(45,61,98,0.08);
  }

  .menu-launch-icon {
    font-size: 21px;
    line-height: 1;
  }

  .menu-launch-label {
    font-size: 14px;
    line-height: 1.3;
  }

  .menu-launch-sub {
    min-height: 1.25em;
    color: var(--muted);
    font-size: 10px;
    font-weight: normal;
    line-height: 1.25;
  }

  .menu-overlay {
    position: fixed;
    inset: 0;
    z-index: 80;
    display: none;
    padding: env(safe-area-inset-top) 0 env(safe-area-inset-bottom);
    background: rgba(240,248,255,0.985);
    text-align: center;
  }

  .menu-overlay.open {
    display: flex;
  }

  .menu-window {
    width: min(100%, 960px);
    height: 100dvh;
    max-height: 100%;
    margin: 0 auto;
    display: flex;
    flex-direction: column;
    overflow: hidden;
    background: #F0F8FF;
  }

  .menu-header {
    flex: 0 0 auto;
    display: grid;
    grid-template-columns: 88px minmax(0, 1fr) 88px;
    align-items: center;
    gap: 4px;
    padding: 10px 12px;
    background: rgba(255,255,255,0.96);
    border-bottom: 2px solid var(--gold);
    box-shadow: 0 4px 12px rgba(45,61,98,0.1);
  }

  .menu-header h2 {
    display: block;
    margin: 0;
    padding: 0;
    background: none;
    border: 0;
    border-radius: 0;
    box-shadow: none;
    color: var(--navy);
    font-size: 20px;
    line-height: 1.35;
  }

  .menu-back {
    min-width: 0;
    margin: 0;
    padding: 8px 9px;
    background: var(--navy);
    font-size: 13px;
    white-space: nowrap;
  }

  .menu-header-spacer {
    width: 88px;
  }

  .menu-scroll {
    flex: 1 1 auto;
    min-height: 0;
    overflow-y: auto;
    overscroll-behavior: contain;
    -webkit-overflow-scrolling: touch;
    padding: 12px 12px calc(18px + env(safe-area-inset-bottom));
  }


  .settings-card {
    width: min(100%, 760px);
    margin: 8px auto;
    padding: 16px 14px;
    background: rgba(255,255,255,0.86);
    border: 1px solid rgba(214,177,93,0.8);
    border-radius: 16px;
    box-shadow: 0 4px 10px rgba(45,61,98,0.06);
  }

  .settings-card h3 {
    margin: 0 0 8px;
    color: var(--navy);
    font-size: 16px;
  }

  .settings-card p {
    margin: 0 0 10px;
    color: var(--muted);
    font-size: 12px;
    line-height: 1.65;
  }

  .reset-area {
    margin-top: 30px;
    padding-top: 16px;
    border-top: 1px dashed #d7c899;
  }

  .reset-note {
    margin: 0 0 4px;
    color: var(--muted);
    font-size: 12px;
  }

  .reset { background: #958b79; border-color: #958b79; }

  @media (max-width: 600px) {
    .game { padding: 6px; }
    .title-logo { width: 310px; max-width: 92%; margin-bottom: -20px; }
    .level-box { margin-bottom: 6px; padding: 5px 13px; font-size: 12px; }
    .room { aspect-ratio: 4 / 3; border-radius: 18px; }
    .salim { width: 32%; bottom: 16%; }
    .status-box { width: 64%; gap: 6px; padding: 6px 8px; border-radius: 12px; }
    .points { min-width: 84px; font-size: 10px; }
    .status-area { font-size: 8px; }
    .bar { height: 7px; margin-top: 2px; }
    .title-badge-box { padding: 5px 9px; border-radius: 14px; }
    .title-badge-label { font-size: 8px; }
    .title-badge-name { font-size: 9px; }
    .message { min-height: 62px; margin: 8px auto; padding: 10px; font-size: 13px; }
    .action-buttons {
      width: fit-content;
      margin: 6px auto 10px;
      padding: 3px 6px;
      background: rgba(240,248,255,0.88);
      border: 1px solid rgba(214,177,93,0.55);
      border-radius: 999px;
    }
    button { padding: 7px 13px; font-size: 12px; }
    .gift-grid { grid-template-columns: 1fr; gap: 6px; }
    .gift-card {
      display: grid;
      grid-template-columns: 66px minmax(0, 1fr) auto;
      grid-template-rows: auto auto;
      align-items: center;
      column-gap: 8px;
      padding: 6px 7px;
      border-radius: 13px;
      text-align: left;
    }
    .gift-card img {
      grid-row: 1 / 3;
      width: 62px;
      height: 62px;
      margin: 0;
    }
    .gift-name {
      min-height: 0;
      justify-content: flex-start;
      font-size: 11px;
      line-height: 1.35;
    }
    .gift-effect { margin-top: 1px; font-size: 9px; }
    .gift-card button {
      grid-column: 3;
      grid-row: 1 / 3;
      margin: 0;
      padding: 7px 8px;
      font-size: 10px;
      white-space: nowrap;
    }
    .item-grid { grid-template-columns: 1fr; gap: 6px; }
    .item-card {
      grid-template-columns: 58px minmax(0, 1fr) auto;
      column-gap: 7px;
      padding: 5px 6px;
      border-radius: 12px;
    }
    .item-card img { width: 54px; height: 54px; }
    .item-name { font-size: 11px; }
    .item-cost { font-size: 9px; }
    .item-card button { padding: 6px 7px; font-size: 10px; }
    .achievement-grid { grid-template-columns: 1fr; gap: 6px; }
    .achievement-summary { padding: 7px 9px; font-size: 11px; }
    .achievement-card { padding: 8px 9px; border-radius: 12px; }
    .achievement-top { font-size: 11px; }
    .achievement-desc, .achievement-progress { font-size: 9px; }
    .achievement-card button { padding: 5px 8px; font-size: 10px; }
    .achievement-toast { top: 8px; font-size: 11px; padding: 8px 12px; }

    .menu-launch-buttons { gap: 6px; margin-top: 7px; }
    .menu-launch-button { padding: 8px 3px; border-radius: 13px; }
    .menu-launch-icon { font-size: 18px; }
    .menu-launch-label { font-size: 11px; }
    .menu-launch-sub { font-size: 8px; }
    .menu-header { grid-template-columns: 76px minmax(0, 1fr) 76px; padding: 8px 9px; }
    .menu-header h2 { font-size: 17px; }
    .menu-back { padding: 7px 7px; font-size: 11px; }
    .menu-header-spacer { width: 76px; }
    .menu-scroll { padding: 9px 7px calc(14px + env(safe-area-inset-bottom)); }
  }
</style>
</head>
<body>
<div class="game">
  <img
    class="title-logo"
    src="https://raw.githubusercontent.com/nonoygk/salim/main/ui/salim-title.png"
    alt="サリムのお部屋 〜王様のひとやすみ〜"
  >

  <div class="level-box" id="levelBox">Lv.1｜王宮の客人</div>

  <div class="room" id="roomAnchor">
    <div class="title-badge-box">
      <div class="title-badge-label">🏅称号</div>
      <div class="title-badge-name" id="selectedTitleName">なし</div>
    </div>

    <div id="roomItems" aria-hidden="true"></div>

    <div class="salim">
      <img
        id="salimImage"
        src="https://raw.githubusercontent.com/nonoygk/salim/main/characters/salim-normal.png"
        alt="ちびサリム"
      >
    </div>

    <div class="status-box">
      <div class="points">
        💖：<span id="affinity">0</span>
      </div>

      <div class="status-area">
        元気：<span id="energyText">50</span>%
        <div class="bar"><div class="bar-fill" id="energyBar"></div></div>
      </div>

      <div class="status-area">
        ご機嫌：<span id="moodText">50</span>%
        <div class="bar"><div class="bar-fill mood-fill" id="moodBar"></div></div>
      </div>
    </div>
  </div>

  <div class="message" id="message">「来たか」</div>

  <div class="action-buttons">
    <button onclick="petSalim()">なでる</button>
    <button onclick="pokeSalim()">つつく</button>
  </div>

  <div class="menu-launch-buttons" aria-label="メニュー">
    <button class="menu-launch-button" type="button" onclick="openMenu('giftMenu')">
      <span class="menu-launch-icon">🫖</span>
      <span class="menu-launch-label">差し入れ</span>
      <span class="menu-launch-sub">3種類</span>
    </button>
    <button class="menu-launch-button" type="button" onclick="openMenu('itemMenu')">
      <span class="menu-launch-icon">🪄</span>
      <span class="menu-launch-label">アイテム</span>
      <span class="menu-launch-sub" id="itemMenuCount">0 / 10</span>
    </button>
    <button class="menu-launch-button" type="button" onclick="openMenu('achievementMenu')">
      <span class="menu-launch-icon">🏅</span>
      <span class="menu-launch-label">実績</span>
      <span class="menu-launch-sub" id="achievementMenuCount">0 / 50</span>
    </button>
    <button class="menu-launch-button" type="button" onclick="openMenu('settingsMenu')">
      <span class="menu-launch-icon">⚙️</span>
      <span class="menu-launch-label">設定</span>
      <span class="menu-launch-sub">データ管理</span>
    </button>
  </div>
</div>

<div class="menu-overlay" id="giftMenu" aria-hidden="true" onclick="closeMenuFromBackdrop(event, 'giftMenu')">
  <div class="menu-window" role="dialog" aria-modal="true" aria-labelledby="giftMenuTitle">
    <div class="menu-header">
      <button class="menu-back" type="button" onclick="closeMenu('giftMenu')">← 戻る</button>
      <h2 id="giftMenuTitle">🫖 差し入れ</h2>
      <div class="menu-header-spacer" aria-hidden="true"></div>
    </div>
    <div class="menu-scroll">
      <div class="gift-grid">
        <div class="gift-card">

  let affinity = loadNumber("affinity", 0);
  let energy = loadNumber("energy", 50);
  let mood = loadNumber("mood", 50);
  let totalAffinityEarned = loadNumber("totalAffinityEarned", affinity);

  let totalGifts = loadNumber("totalGifts", 0);
  let totalMilkTea = loadNumber("totalMilkTea", 0);
  let totalDatesNuts = loadNumber("totalDatesNuts", 0);

  let purchasedItems = loadJSON("purchasedItems", {});
  let unlockedAchievements = loadJSON("unlockedAchievements", {});
  let selectedTitle = loadText("selectedTitle", "なし");
  let manualTitleSelection = loadBoolean("manualTitleSelection", false);
  let achievementToastTimer = 0;
  let achievementsDirty = true;
  let energyTimer = 0;
  let moodTimer = 0;
  let temporaryImageTimer = 0;
  let messageLockTimer = 0;
  let statusMessageTimer = 0;
  let currentStatusKey = "";
  const STATUS_MESSAGE_SECONDS = 10;

  const affinityText = document.getElementById("affinity");

  const moodText = document.getElementById("moodText");
  const energyBar = document.getElementById("energyBar");
  const moodBar = document.getElementById("moodBar");

  const salimImage = document.getElementById("salimImage");

  const itemGrid = document.getElementById("itemGrid");
  const achievementGrid = document.getElementById("achievementGrid");
  const achievementSummary = document.getElementById("achievementSummary");
  const achievementToast = document.getElementById("achievementToast");
  const selectedTitleName = document.getElementById("selectedTitleName");
  const itemMenuCount = document.getElementById("itemMenuCount");
  const achievementMenuCount = document.getElementById("achievementMenuCount");

  function storageKey(name) {
    return STORAGE_PREFIX + name;
  }

  function loadNumber(name, fallback) {
    const saved = localStorage.getItem(storageKey(name));
    if (saved === null) return fallback;

    const value = Number(saved);
    return Number.isFinite(value) ? value : fallback;
  }

  function loadJSON(name, fallback) {
    const saved = localStorage.getItem(storageKey(name));
    if (saved === null) return fallback;

    try {
      const value = JSON.parse(saved);
      return value && typeof value === "object" ? value : fallback;
    } catch (error) {
      return fallback;
    }
  }

  function loadText(name, fallback) {
    const saved = localStorage.getItem(storageKey(name));
    return saved === null ? fallback : saved;
  }

  function loadBoolean(name, fallback) {
    const saved = localStorage.getItem(storageKey(name));
    if (saved === null) return fallback;
    return saved === "true";
  }

  function saveGame() {
    localStorage.setItem(storageKey("affinity"), affinity);
    localStorage.setItem(storageKey("energy"), energy);
    localStorage.setItem(storageKey("mood"), mood);
    localStorage.setItem(storageKey("totalAffinityEarned"), totalAffinityEarned);
    localStorage.setItem(storageKey("totalPets"), totalPets);
    localStorage.setItem(storageKey("totalPokes"), totalPokes);
    localStorage.setItem(storageKey("totalGifts"), totalGifts);
    localStorage.setItem(storageKey("totalMilkTea"), totalMilkTea);
    localStorage.setItem(storageKey("totalDatesNuts"), totalDatesNuts);
    localStorage.setItem(storageKey("totalJewelJelly"), totalJewelJelly);
    localStorage.setItem(storageKey("purchasedItems"), JSON.stringify(purchasedItems));
    localStorage.setItem(storageKey("unlockedAchievements"), JSON.stringify(unlockedAchievements));
    localStorage.setItem(storageKey("selectedTitle"), selectedTitle);
    localStorage.setItem(storageKey("manualTitleSelection"), String(manualTitleSelection));
    localStorage.setItem(storageKey("lastSave"), Date.now());
  }

  function applyOfflineProgress() {
    const lastSave = Number(localStorage.getItem(storageKey("lastSave"))) || Date.now();
    const offlineSeconds = Math.max(0, Math.floor((Date.now() - lastSave) / 1000));

    if (offlineSeconds <= 0) return;

    addAffinity(offlineSeconds);
    energy = Math.max(0, energy - Math.floor(offlineSeconds / 60));
    mood = Math.max(0, mood - Math.floor(offlineSeconds / 120));
  }

  function addAffinity(amount) {
    affinity += amount;
    totalAffinityEarned += amount;
  }

  function formatNumber(value) {
    value = Math.floor(Number(value) || 0);
    if (value < 10000) return String(value);

    const units = [
      { value: 100000000, label: "億" },
      { value: 10000, label: "万" }
    ];

    for (let i = 0; i < units.length; i++) {
      if (value >= units[i].value) {
        const shortValue = value / units[i].value;
        const text = shortValue >= 100 ? Math.floor(shortValue) : Math.floor(shortValue * 10) / 10;
        return text + units[i].label;
      }
    }

    return String(value);
  }

  function getLevel() {
    return Math.floor(Math.sqrt(totalAffinityEarned / LEVEL_GROWTH_BASE)) + 1;
  }

  function getRelationshipName(level) {
    if (level >= 1000) return "永遠の愛";
    if (level >= 500) return "王の帰る場所";
    if (level >= 250) return "最愛の伴侶";
    if (level >= 100) return "かけがえのない存在";
    if (level >= 50) return "特別な人";
    if (level >= 25) return "気になる相手";
    if (level >= 10) return "気の合う話し相手";
    return "王宮の客人";
  }

  function updateLevelBox() {
    const level = getLevel();
    levelBox.textContent = "Lv." + level + "｜" + getRelationshipName(level);
  }

  function getStatusKey() {
    if (energy <= 0) return "exhausted";
    if (energy <= 30) return "tired";
    if (mood >= 95) return "superhappy";
    if (mood >= 70) return "happy";
    return "normal";
  }

  function pickRandom(list) {
    return list[Math.floor(Math.random() * list.length)];
  }

  function getDialogueTier() {
    const level = getLevel();
    if (level >= 100) return "late";
    if (level >= 25) return "middle";
    return "early";
  }

  function formatSalimLine(line) {
    if (!line) return "";
    return getDialogueTier() === "late" ? line.replaceAll("君", "お前") : line;
  }

  function getPurchasedItemCount() {
    return ITEMS.filter(function(item) { return Boolean(purchasedItems[item.id]); }).length;
  }

  function setMessage(line, lockSeconds) {
    message.textContent = "「" + formatSalimLine(line) + "」";
    messageLockTimer = lockSeconds || 3;
    statusMessageTimer = 0;
  }

  function getGiftMemoryPool() {
    const pool = [];
    if (totalMilkTea > 0) pool.push.apply(pool, GIFT_MEMORY_MESSAGES.milkTea);
    if (totalDatesNuts > 0) pool.push.apply(pool, GIFT_MEMORY_MESSAGES.datesNuts);
    if (totalJewelJelly > 0) pool.push.apply(pool, GIFT_MEMORY_MESSAGES.jewelJelly);
    return pool;
  }

  function setStatusMessage(statusKey) {
    const tier = getDialogueTier();
    const messageKey = statusKey + ":" + tier;

    if (currentStatusKey !== messageKey || statusMessageTimer <= 0) {
      const giftMemoryPool = getGiftMemoryPool();
      const honestPool = RARE_HONEST_MESSAGES[tier] || [];
      const useHonestMessage = honestPool.length > 0 && (statusKey === "normal" || statusKey === "happy") && Math.random() < 0.06;
      const useGiftMemory = !useHonestMessage && statusKey === "normal" && giftMemoryPool.length > 0 && Math.random() < 0.28;
      const pool = (STATUS_MESSAGES[tier] && STATUS_MESSAGES[tier][statusKey]) || STATUS_MESSAGES.early.normal;
      const picked = useHonestMessage
        ? pickRandom(honestPool)
        : useGiftMemory
          ? pickRandom(giftMemoryPool)
          : pickRandom(pool);

      currentStatusKey = messageKey;
      message.textContent = "「" + formatSalimLine(picked) + "」";
      statusMessageTimer = STATUS_MESSAGE_SECONDS;
    }
  }

  function setSalimImageByStatus() {
    if (temporaryImageTimer > 0) return;
    salimImage.src = IMAGES[getStatusKey()];
  }

  function showTemporaryImage(imageUrl, seconds) {
    salimImage.src = imageUrl;
    temporaryImageTimer = seconds;
  }

  function createRoomItems() {
    if (!roomItems) return;
    roomItems.innerHTML = "";

    ITEMS.forEach(function(item) {
      const image = document.createElement("img");
      image.className = "room-item item-" + item.id;
      image.dataset.itemId = item.id;
      image.src = item.image;
      image.alt = item.name;
      roomItems.appendChild(image);
    });
  }

  function renderItemShop() {
    if (!itemGrid) return;
    itemGrid.innerHTML = "";

    ITEMS.forEach(function(item) {
      const card = document.createElement("div");
      card.className = "item-card";

      const image = document.createElement("img");
      image.src = item.image;
      image.alt = item.name;

      const name = document.createElement("div");
      name.className = "item-name";
      name.textContent = item.name;

      const cost = document.createElement("div");
      cost.className = "item-cost";
      cost.textContent = "必要💖：" + formatNumber(item.price);

      const button = document.createElement("button");
      button.type = "button";
      button.dataset.itemId = item.id;
      button.onclick = function() { buyItem(item.id); };

      card.appendChild(image);
      card.appendChild(name);
      card.appendChild(cost);
      card.appendChild(button);
      itemGrid.appendChild(card);
    });

    updateItemShop();
  }

  function updateItemShop() {
    if (!itemGrid) return;

    itemGrid.querySelectorAll("button[data-item-id]").forEach(function(button) {
      const itemId = button.dataset.itemId;
      const owned = Boolean(purchasedItems[itemId]);
      button.disabled = owned;
      button.textContent = owned ? "購入済み" : "購入する";
    });

    if (itemMenuCount) itemMenuCount.textContent = getPurchasedItemCount() + " / " + ITEMS.length;
  }

  function updateRoomItems() {
    if (!roomItems) return;

    roomItems.querySelectorAll(".room-item[data-item-id]").forEach(function(image) {
      const visible = Boolean(purchasedItems[image.dataset.itemId]);
      image.classList.toggle("visible", visible);
    });
  }

  function buyItem(itemId) {
    const item = ITEMS.find(function(entry) { return entry.id === itemId; });
    if (!item || purchasedItems[itemId]) return;

    if (affinity < item.price) {
      setMessage(pickRandom(NOT_ENOUGH_AFFINITY_MESSAGES), 3);
      updateScreen();
      closeMenu("itemMenu");
      scrollToSalimReaction();
      return;
    }

    affinity -= item.price;
    purchasedItems[itemId] = true;
    updateRoomItems();
    updateItemShop();
    setMessage(item.message, 4);
    updateScreen();
    closeMenu("itemMenu");
    scrollToSalimReaction();
  }


  function updateSelectedTitle() {
    if (selectedTitleName) selectedTitleName.textContent = selectedTitle || "なし";
  }

  function showAchievementToast(newAchievements) {
    if (!achievementToast || !newAchievements.length) return;
    const first = newAchievements[0];
    achievementToast.textContent = newAchievements.length === 1
      ? "🏅 実績解放：" + first.name
      : "🏅 実績を" + newAchievements.length + "個解放！　" + first.name + " ほか";
    achievementToast.classList.add("show");
    achievementToastTimer = 4;
  }

  function checkAchievements(showNotice) {
    const newlyUnlocked = [];

    ACHIEVEMENTS.forEach(function(achievement) {
      if (!unlockedAchievements[achievement.id] && achievement.current() >= achievement.target) {
        unlockedAchievements[achievement.id] = true;
        newlyUnlocked.push(achievement);
      }
    });

    if (newlyUnlocked.length > 0 && !manualTitleSelection) {
      const latestWithTitle = newlyUnlocked.filter(function(entry) { return Boolean(entry.title); }).pop();
      if (latestWithTitle) selectedTitle = latestWithTitle.title;
    }

    if (newlyUnlocked.length > 0) achievementsDirty = true;
    if (showNotice !== false && newlyUnlocked.length > 0) showAchievementToast(newlyUnlocked);
    updateSelectedTitle();
    updateAchievementMenuCount();
    return newlyUnlocked;
  }

  function selectTitle(title) {
    selectedTitle = title || "なし";
    manualTitleSelection = true;
    updateSelectedTitle();
    saveGame();
    achievementsDirty = true;
    renderAchievements(true);
  }

  function updateAchievementMenuCount() {
    if (!achievementMenuCount) return;
    const unlockedCount = ACHIEVEMENTS.filter(function(entry) { return Boolean(unlockedAchievements[entry.id]); }).length;
    achievementMenuCount.textContent = unlockedCount + " / " + ACHIEVEMENTS.length;
  }

  function renderAchievements(force) {
    if (!achievementGrid || !achievementSummary) return;
    if (!force && !achievementsDirty) return;
    achievementGrid.innerHTML = "";

    const unlockedCount = ACHIEVEMENTS.filter(function(entry) { return Boolean(unlockedAchievements[entry.id]); }).length;
    achievementSummary.textContent = "解放済み：" + unlockedCount + " / " + ACHIEVEMENTS.length + "　｜　現在の称号：" + (selectedTitle || "なし");
    updateAchievementMenuCount();

    ACHIEVEMENTS.forEach(function(achievement) {
      const unlocked = Boolean(unlockedAchievements[achievement.id]);
      const current = Math.min(achievement.current(), achievement.target);
      const card = document.createElement("div");
      card.className = "achievement-card" + (unlocked ? "" : " locked");

      const top = document.createElement("div");
      top.className = "achievement-top";
      top.textContent = (unlocked ? "🏅 " + achievement.name : "🔒 ？？？");

      const desc = document.createElement("div");
      desc.className = "achievement-desc";
      desc.textContent = achievement.description;

      const progress = document.createElement("div");
      progress.className = "achievement-progress";
      progress.textContent = "進捗：" + formatNumber(current) + " / " + formatNumber(achievement.target)
        + (achievement.title ? "　｜　称号：" + (unlocked ? achievement.title : "？？？") : "");

      card.appendChild(top);
      card.appendChild(desc);
      card.appendChild(progress);

      if (unlocked && achievement.title) {
        const button = document.createElement("button");
        button.type = "button";
        button.textContent = selectedTitle === achievement.title ? "設定中" : "称号に設定";
        button.disabled = selectedTitle === achievement.title;
        button.onclick = function() { selectTitle(achievement.title); };
        card.appendChild(button);
      }

      achievementGrid.appendChild(card);
    });

    achievementsDirty = false;
  }

  function updateScreen() {
    affinityText.textContent = formatNumber(affinity);
    energyText.textContent = energy;
    moodText.textContent = mood;
    energyBar.style.width = energy + "%";
    moodBar.style.width = mood + "%";
    updateLevelBox();
    checkAchievements(true);
    renderAchievements();
    setSalimImageByStatus();

    if (messageLockTimer <= 0) {
      setStatusMessage(getStatusKey());
    }

    saveGame();
  }

  function petSalim() {
    addAffinity(5);
    mood = Math.min(100, mood + 5);
    totalPets += 1;
    showTemporaryImage(IMAGES.petted, 3);
    setMessage(pickRandom(PET_MESSAGES[getDialogueTier()]), 3);
    updateScreen();
  }

  function pokeSalim() {
    addAffinity(1);
    totalPokes += 1;
    showTemporaryImage(IMAGES.poked, 3);
    const tier = getDialogueTier();
    let pokeLine = pickRandom(POKE_MESSAGES[tier]);
    if (totalPokes >= 30 && Math.random() < 0.35) pokeLine = tier === "late" ? "次は本当に捕まえるぞ。……お前が望んでいるなら別だが" : "次にやったら、こっちから捕まえるぞ";
    setMessage(pokeLine, 3);
    updateScreen();
  }

  function openMenu(menuId) {
    closeMenu();
    const menu = document.getElementById(menuId);
    if (!menu) return;

    menu.classList.add("open");
    menu.setAttribute("aria-hidden", "false");
    document.body.classList.add("menu-open");

    if (menuId === "achievementMenu") renderAchievements(true);

    const scrollArea = menu.querySelector(".menu-scroll");
    if (scrollArea) scrollArea.scrollTop = 0;
  }

  function closeMenu(menuId) {
    const menus = menuId
      ? [document.getElementById(menuId)]
      : Array.from(document.querySelectorAll(".menu-overlay.open"));

    menus.forEach(function(menu) {
      if (!menu) return;
      menu.classList.remove("open");
      menu.setAttribute("aria-hidden", "true");
    });

    if (!document.querySelector(".menu-overlay.open")) {
      document.body.classList.remove("menu-open");
    }
  }

  function closeMenuFromBackdrop(event, menuId) {
    if (event.target === event.currentTarget) closeMenu(menuId);
  }

  function scrollToSalimReaction() {
    window.setTimeout(function() {
      const room = document.getElementById("roomAnchor");
      if (room) room.scrollIntoView({ behavior: "smooth", block: "start" });
    }, 40);
  }

  document.addEventListener("keydown", function(event) {
    if (event.key === "Escape") closeMenu();
  });

  function giveGift(giftId) {
    const gift = GIFTS[giftId];
    if (!gift) return;

    if (affinity < gift.price) {
      showTemporaryImage(IMAGES.exhausted, 3);
      setMessage(pickRandom(NOT_ENOUGH_AFFINITY_MESSAGES), 3);
      updateScreen();
      closeMenu("giftMenu");
      scrollToSalimReaction();
      return;
    }

    affinity -= gift.price;
    energy = Math.min(100, energy + gift.energyRecovery);
    mood = Math.min(100, mood + gift.moodRecovery);
    totalGifts += 1;

    if (giftId === "milkTea") totalMilkTea += 1;
    if (giftId === "datesNuts") totalDatesNuts += 1;
    if (giftId === "jewelJelly") totalJewelJelly += 1;

    showTemporaryImage(gift.image, gift.seconds);
    setMessage(pickRandom(gift.messages), gift.seconds);
    updateScreen();
    closeMenu("giftMenu");
    scrollToSalimReaction();
  }


  function resetGame() {
    const shouldReset = window.confirm("本当に最初からやり直しますか？\n親愛ポイント、ステータス、購入済みアイテム、実績が初期状態に戻ります。");
    if (!shouldReset) return;

    Object.keys(localStorage).forEach(function(key) {
      if (key.startsWith(STORAGE_PREFIX)) localStorage.removeItem(key);
    });

    affinity = 0;
    energy = 50;
    mood = 50;
    totalAffinityEarned = 0;
    totalPets = 0;
    totalPokes = 0;
    totalGifts = 0;
    totalMilkTea = 0;
    totalDatesNuts = 0;
    totalJewelJelly = 0;
    purchasedItems = {};
    unlockedAchievements = {};
    selectedTitle = "なし";
    manualTitleSelection = false;
    achievementToastTimer = 0;
    achievementsDirty = true;
    energyTimer = 0;
    moodTimer = 0;
    temporaryImageTimer = 0;
    messageLockTimer = 0;
    statusMessageTimer = 0;
    currentStatusKey = "";
    salimImage.src = IMAGES.normal;
    updateRoomItems();
    updateItemShop();
    setMessage("来たか", 3);
    updateScreen();
    closeMenu("settingsMenu");
  }

  createRoomItems();
  renderItemShop();
  updateRoomItems();
  applyOfflineProgress();
  checkAchievements(false);
  renderAchievements(true);
  updateSelectedTitle();

  setInterval(function() {
    addAffinity(1);
    energyTimer += 1;
    moodTimer += 1;

    if (energyTimer >= 60) {
      energyTimer = 0;
      energy = Math.max(0, energy - 1);
    }

    if (moodTimer >= 120) {
      moodTimer = 0;
      mood = Math.max(0, mood - 1);
    }

    if (temporaryImageTimer > 0) {
      temporaryImageTimer -= 1;
      if (temporaryImageTimer <= 0) setSalimImageByStatus();
    }

    if (messageLockTimer > 0) messageLockTimer -= 1;
    if (statusMessageTimer > 0) statusMessageTimer -= 1;

    if (achievementToastTimer > 0) {
      achievementToastTimer -= 1;
      if (achievementToastTimer <= 0 && achievementToast) achievementToast.classList.remove("show");
    }

    updateScreen();
  }, 1000);

  updateScreen();
</script>
</body>
